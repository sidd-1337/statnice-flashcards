<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Státnice Flashcards</title>
</head>
<body>
<style>
:root{
  --bg:#f1eee6; --bg2:#e9e5d9; --ink:#272b3d; --muted:#6d7186; --line:#d8d3c4;
  --card:#fbf9f1; --card-ink:#2b2518; --card-line:#b9cfe0; --card-margin:#e8a0a0;
  --chip:#ffffff; --chip-ink:#454a60; --chip-line:#d8d3c4;
  --good:#1f9e77; --good-ink:#ffffff; --bad:#cf4a63; --bad-ink:#ffffff;
  --o1:#3f6fd8; --o2:#8a55e0; --o3:#dd7c26;
  --shadow:0 10px 30px rgba(40,35,20,.18), 0 2px 6px rgba(40,35,20,.12);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#10141f; --bg2:#161b2b; --ink:#e8eaf2; --muted:#8b90a5; --line:#272e44;
    --chip:#1a2033; --chip-ink:#c6cadb; --chip-line:#2c3450;
    --card:#f7f4ea; --card-ink:#2b2518;
    --o1:#6b93ef; --o2:#a97ef2; --o3:#ef9c4a;
    --shadow:0 14px 40px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.4);
  }
}
:root[data-theme="dark"]{
  --bg:#10141f; --bg2:#161b2b; --ink:#e8eaf2; --muted:#8b90a5; --line:#272e44;
  --chip:#1a2033; --chip-ink:#c6cadb; --chip-line:#2c3450;
  --card:#f7f4ea; --card-ink:#2b2518;
  --o1:#6b93ef; --o2:#a97ef2; --o3:#ef9c4a;
  --shadow:0 14px 40px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.4);
}
:root[data-theme="light"]{
  --bg:#f1eee6; --bg2:#e9e5d9; --ink:#272b3d; --muted:#6d7186; --line:#d8d3c4;
  --chip:#ffffff; --chip-ink:#454a60; --chip-line:#d8d3c4;
  --card:#fbf9f1; --card-ink:#2b2518;
  --o1:#3f6fd8; --o2:#8a55e0; --o3:#dd7c26;
  --shadow:0 10px 30px rgba(40,35,20,.18), 0 2px 6px rgba(40,35,20,.12);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(1200px 600px at 50% -100px, var(--bg2), var(--bg));
  color:var(--ink);
  font-family:"Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,sans-serif;
  min-height:100vh;
}
.wrap{max-width:660px;margin:0 auto;padding:16px 16px 40px}
header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
header h1{font-size:1.15rem;font-weight:700;margin:0;letter-spacing:.2px}
.pill{font-size:.78rem;font-weight:600;color:var(--chip-ink);background:var(--chip);
  border:1px solid var(--chip-line);border-radius:999px;padding:5px 12px;white-space:nowrap}
a.pill{text-decoration:none;cursor:pointer}
a.pill:hover{border-color:var(--ink)}
.spacer{flex:1}
#themeBtn{background:var(--chip);border:1px solid var(--chip-line);color:var(--chip-ink);
  border-radius:999px;width:34px;height:34px;cursor:pointer;font-size:1rem;line-height:1}
.decks{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;margin-bottom:6px;scrollbar-width:thin}
.decks button{
  flex:0 0 auto;border:1px solid var(--chip-line);background:var(--chip);color:var(--chip-ink);
  border-radius:999px;padding:9px 14px;font-size:.85rem;font-weight:600;cursor:pointer;
  transition:transform .12s ease, border-color .12s ease;
}
.decks button:hover{transform:translateY(-1px)}
.decks button.active{border-color:var(--ink);color:var(--ink)}
.rowsel{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.rowsel select{
  flex:1;min-width:0;background:var(--chip);color:var(--chip-ink);border:1px solid var(--chip-line);
  border-radius:10px;padding:9px 10px;font-size:.85rem;font-family:inherit;
}
.deckinfo{font-size:.8rem;color:var(--muted);margin:2px 2px 10px;min-height:1.1em}
.progress{height:5px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:16px}
.progress i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--o1),var(--o2),var(--o3));
  border-radius:99px;transition:width .25s ease}
.stage{perspective:1400px;min-height:380px;position:relative}
.card{
  position:relative;width:100%;min-height:380px;cursor:pointer;
  transform-style:preserve-3d;transition:transform .45s cubic-bezier(.2,.7,.25,1);
}
.card.flipped{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;
  background:
    linear-gradient(90deg, transparent 34px, var(--card-margin) 34px, var(--card-margin) 35.5px, transparent 35.5px),
    repeating-linear-gradient(to bottom, transparent 0 31px, var(--card-line) 31px 32px),
    var(--card);
  background-blend-mode:normal;
  box-shadow:var(--shadow);
  color:var(--card-ink);
  padding:22px 24px 24px 50px;
  display:flex;flex-direction:column;
}
.face .lines-off{background:var(--card)}
.back{transform:rotateY(180deg)}
.meta{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.badge{font-family:Consolas,ui-monospace,monospace;font-size:.72rem;font-weight:700;color:#fff;
  border-radius:6px;padding:3px 8px;letter-spacing:.5px}
.badge.o1{background:var(--o1)} .badge.o2{background:var(--o2)} .badge.o3{background:var(--o3)}
.tag{font-size:.7rem;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#8a6d1f;
  background:#f3e3ae;border-radius:6px;padding:3px 8px}
.sideLabel{margin-left:auto;font-size:.68rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#b0a68d}
.qtext{
  font-family:Georgia,"Times New Roman",serif;
  font-size:1.35rem;line-height:2rem;text-wrap:balance;margin:auto 0;
  padding:4px 0;
}
.atext{
  font-family:Georgia,"Times New Roman",serif;
  font-size:1.02rem;line-height:1.6rem;white-space:pre-wrap;overflow-y:auto;
  margin:0;max-height:420px;padding-right:6px;
}
.hint{font-size:.75rem;color:#b0a68d;text-align:center;margin-top:14px}
.actions{display:flex;gap:12px;margin-top:18px}
.actions button{
  flex:1;border:none;border-radius:14px;min-height:58px;font-size:1rem;font-weight:700;
  cursor:pointer;font-family:inherit;transition:transform .1s ease,filter .1s ease;
}
.actions button:active{transform:scale(.98)}
.actions .good{background:var(--good);color:var(--good-ink)}
.actions .bad{background:var(--bad);color:var(--bad-ink)}
.actions button:disabled{opacity:.35;cursor:default;filter:grayscale(.4)}
.kbd{font-size:.72rem;opacity:.75;font-weight:500}
.summary,.empty{
  background:var(--chip);border:1px solid var(--chip-line);border-radius:16px;
  padding:28px 24px;text-align:center;box-shadow:var(--shadow);
}
.summary h2{margin:0 0 6px;font-size:1.3rem}
.summary .big{font-size:2.6rem;font-weight:800;margin:10px 0;
  background:linear-gradient(90deg,var(--o1),var(--o2),var(--o3));
  -webkit-background-clip:text;background-clip:text;color:transparent}
.summary p{color:var(--muted);font-size:.9rem;margin:6px 0 18px}
.summary .misses{text-align:left;font-size:.85rem;color:var(--ink);margin:0 0 18px;padding:0 0 0 18px}
.summary .misses li{margin-bottom:5px}
.sumbtns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.sumbtns button{
  border:1px solid var(--chip-line);background:var(--bg);color:var(--ink);border-radius:12px;
  padding:12px 18px;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit;
}
.sumbtns button.primary{background:var(--good);border-color:var(--good);color:#fff}
.statsline{font-size:.78rem;color:var(--muted);text-align:center;margin-top:16px}
footer{margin-top:26px;text-align:center;font-size:.72rem;color:var(--muted)}
:focus-visible{outline:2px solid var(--o1);outline-offset:2px}
@media (prefers-reduced-motion: reduce){
  .card{transition:none}
  .decks button, .actions button{transition:none}
}
@media (max-width:480px){
  .qtext{font-size:1.18rem;line-height:1.75rem}
  .face{padding-left:44px}
}
</style>

<div class="wrap">
  <header>
    <h1>🃏 Státnice Flashcards</h1>
    <span class="pill" id="countdown"></span>
    <a class="pill" href="https://app.notion.com/p/3a231e9b16488133a23dc2a89cebdbab" target="_blank" rel="noopener">📒 Study Planner</a>
    <span class="spacer"></span>
    <button id="themeBtn" title="Přepnout vzhled">🌓</button>
  </header>

  <div class="decks" id="deckBar"></div>
  <div class="rowsel">
    <select id="kodSelect"><option value="">🎯 …nebo vyber konkrétní otázku</option></select>
  </div>
  <div class="deckinfo" id="deckInfo"></div>
  <div class="progress"><i id="bar"></i></div>

  <div class="stage" id="stage">
    <div class="card" id="card" tabindex="0" role="button" aria-label="Otočit kartu">
      <div class="face front">
        <div class="meta">
          <span class="badge" id="fBadge"></span>
          <span class="tag" id="fTag" hidden>🗣️ osnova</span>
          <span class="sideLabel">Otázka</span>
        </div>
        <div class="qtext" id="qText"></div>
        <div class="hint">klepni / mezerník = otočit</div>
      </div>
      <div class="face back">
        <div class="meta">
          <span class="badge" id="bBadge"></span>
          <span class="sideLabel">Odpověď</span>
        </div>
        <p class="atext" id="aText"></p>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="bad" id="btnBad" disabled>❌ Ještě ne <span class="kbd">(2)</span></button>
    <button class="good" id="btnGood" disabled>✅ Umím <span class="kbd">(1)</span></button>
  </div>

  <div class="statsline" id="statsLine"></div>
  <footer>NMgr7ISN · 250 karet z 27 otázek · pokrok se ukládá jen v tomto prohlížeči</footer>
</div>

<script>
const CARDS_RAW = [{"q":"Co přesně je PKP a jaká je hlavní myšlenka důkazu jeho nerozhodnutelnosti?","a":"Ke dvěma seznamům slov hledáme posloupnost indexů, při níž zřetězení slov z obou seznamů dá stejný řetězec. Důkaz: HP ⊴ IPKP ⊴ PKP. Dvojice slov se navrhnou tak, aby jediné možné iniciální řešení kódovalo posloupnost konfigurací výpočtu stroje M na slově w oddělených # — řešení tedy existuje právě tehdy, když se M zastaví.","kod":"7ZNA1/01","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Jaký je rozdíl mezi „přijímá\" a „rozhoduje\" jazyk?","a":"Stroj přijímá (částečně rozhoduje) L, když se zastaví právě pro slova z L — pro slova mimo L běží donekonečna. Stroj rozhoduje L, když se zastaví na každém vstupu a odpoví ANO/NE (např. stavy q_ano/q_ne). Rozhodování je silnější: rozhodnutelný jazyk = rekurzivní, přijímaný = rekurzivně spočetný.","kod":"7ZNA1/01","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Jakým směrem se při důkazu nerozhodnutelnosti převádí a proč?","a":"Známý nerozhodnutelný problém P1 převádím NA zkoumaný problém P2 (P1 ⊴ P2). Kdyby totiž P2 byl rozhodnutelný, složením převodu a rozhodovacího algoritmu bych uměl rozhodovat P1 — spor. Nejčastější chyba je převádět obráceně: tím bych jen ukázal, že P2 je „aspoň tak lehký\", což o jeho nerozhodnutelnosti neříká nic.","kod":"7ZNA1/01","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Kam patří TS v Chomského hierarchii?","a":"Jazyky přijímané Turingovými stroji jsou přesně neomezené jazyky (typ 0), generované obecnými gramatikami bez omezení tvaru pravidel. TS je tak nejsilnější z klasických strojových modelů (konečný automat → typ 3, zásobníkový automat → typ 2, LBA → typ 1, TS → typ 0).","kod":"7ZNA1/01","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Proč existují jazyky, které nejsou ani částečně rozhodnutelné?","a":"Argument mohutnostmi: strojů je spočetně (lze je enumerovat M0, M1, … dle rostoucího uspořádání kódů), zatímco jazyků nad {0,1} je dle Cantorovy věty nespočetně — jazyků je víc než strojů. Konstruktivně diagonalizací: jazyk L = {wi | ¬!Mi(wi)} se od jazyka každého stroje Mi liší na slově wi, takže ho žádný stroj nepřijímá.","kod":"7ZNA1/01","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Proč je HP částečně rozhodnutelný, ale jeho doplněk ne?","a":"HP částečně rozhoduje univerzální stroj U simulací: zastaví-li se M na w, simulace skončí (odpověď ANO). Kdyby byl částečně rozhodnutelný i doplněk HP, byl by HP dle Postovy věty rozhodnutelný — a to jsme vyvrátili diagonálním důkazem sporem. Doplněk HP tedy není ani částečně rozhodnutelný.","kod":"7ZNA1/01","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Proč nedeterminismus nezvyšuje výpočetní sílu Turingových strojů?","a":"Ke každému NTS existuje deterministický stroj přijímající tentýž jazyk. Deterministický stroj udržuje na pásce seznam všech dosažitelných konfigurací (oddělených speciálními symboly), při větvení konfiguraci zduplikuje a v každé střídavě provádí po jednom kroku — je to systematické prohledávání stromu výpočtů do šířky. Jakmile některá větev dosáhne koncového stavu, slovo přijme.","kod":"7ZNA1/01","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Proč nelze Churchovu tezi dokázat jako matematickou větu?","a":"Protože pojem „algoritmus\" je intuitivní, nemá formální definici — nelze tedy formálně dokázat, že každý algoritmus má ekvivalentní TS. Opačný směr je zřejmý (každý TS je algoritmus). Přijímáme ji na základě velmi dobrých důvodů: všechny známé formalizace (TS, Postovy systémy, Markovovy algoritmy, částečně rekurzivní funkce, programovací jazyky) se ukázaly ekvivalentní.","kod":"7ZNA1/01","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Uveďte netriviální vlastnost pro Riceovu větu.","a":"Například „stroj M přijímá prázdný jazyk\" (nikdy se nezastaví na žádném vstupu), „M realizuje konkrétní dané zobrazení\" nebo „M se zastaví alespoň na jednom vstupu\". Všechny se týkají výhradně vstupně/výstupního chování a existují stroje, které vlastnost mají, i stroje, které ji nemají — dle Riceovy věty jsou tedy nerozhodnutelné. Naopak vlastnost typu „M má 5 stavů\" se netýká chování a Riceova věta se na ni nevztahuje.","kod":"7ZNA1/01","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"🗣️ 7ZNA1/01 — Řekni osnovu odpovědi","a":"Nejprve formalizuji pojem problém, zavedu rozhodnutelnost a částečnou rozhodnutelnost včetně Postovy věty, pak Turingův stroj jako formalizaci pojmu algoritmus (Churchova teze), univerzální stroj, důkaz nerozhodnutelnosti problému zastavení a nakonec převody problémů jako techniku šíření nerozhodnutelnosti (PKP, Riceova věta).","kod":"7ZNA1/01","okruh":"7ZNA1","typ":"🗣️ Osnova","datum":"2026-07-19"},{"q":"Co by znamenalo P = NP?","a":"Každý problém rozhodnutelný nedeterministicky v polynomiálním čase — tedy i všechny NP-úplné problémy jako SAT nebo obchodní cestující — by měl deterministický polynomiální algoritmus. Stačilo by přitom najít polynomiální algoritmus pro jediný NP-úplný problém, protože vše z NP je na něj polynomiálně převeditelné. Nikomu se to zatím nepodařilo, ale nikdo ani nedokázal, že to nejde.","kod":"7ZNA1/02","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Co je vnitřní složitost problému a proč je hůře uchopitelná než složitost algoritmu?","a":"Zhruba řečeno složitost toho nejoptimálnějšího algoritmu, který daný problém řeší; umožňuje problémy porovnávat podle obtížnosti. Složitost algoritmu spočítám rozborem konkrétního stroje, ale u problému bych musel dokázat dolní odhad pro všechny myslitelné algoritmy — a takové důkazy jsou velmi obtížné.","kod":"7ZNA1/02","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Jak se dokazuje NP-úplnost nového problému?","a":"Dva kroky: 1) ukázat členství v NP — nedeterministicky uhodnu kandidáta na řešení a v polynomiálním čase ho ověřím; 2) vzít známý NP-těžký problém (např. SAT z Cookovy věty) a polynomiálně ho převést NA nový problém. Podle tvrzení ze skript pak je nový problém NP-těžký, a spolu s členstvím v NP tedy NP-úplný. Směr převodu je kritický — stejně jako u důkazů nerozhodnutelnosti.","kod":"7ZNA1/02","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Jaký je rozdíl mezi O a Θ (a k čemu jsou o a Ω∞)?","a":"O(g) je jen neostrý horní odhad — funkce neroste rychleji než g (až na konstantu). Θ(g) znamená f ∈ O(g) a zároveň g ∈ O(f), tedy horní i dolní odhad současně: složitost je určena „přesně“ až na konstantní faktory. o(g) je ostrý horní odhad (f roste řádově pomaleji než g) a Ω∞(g) je dolní odhad — existuje k \u003e 0 a nekonečně mnoho n s f(n) ≥ k·g(n).","kod":"7ZNA1/02","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Jaký je rozdíl mezi worst case a průměrným případem?","a":"Tₘ(n) definujeme jako maximum složitostí výpočtů přes všechny vstupy délky n — nejhorší případ. Průměrný případ by průměroval přes (nějak rozdělené) vstupy; je realističtější, ale hůře se definuje i analyzuje. Skripta i standardní teorie tříd složitosti pracují s worst case, protože dává zaručený horní limit chování.","kod":"7ZNA1/02","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Jaký je vztah algoritmické a polynomiální převeditelnosti (vazba na první otázku)?","a":"Definice je v podstatě stejná: instance jednoho problému se algoritmicky transformuje na instanci druhého se zachováním odpovědi ANO/NE. Rozdíl je jediný — u polynomiální převeditelnosti se od převodního Turingova stroje navíc požaduje polynomiální časová složitost. Algoritmická převeditelnost slouží k přenášení (ne)rozhodnutelnosti, polynomiální k přenášení (ne)zvládnutelnosti.","kod":"7ZNA1/02","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Proč je polynomialita rozumné kritérium zvládnutelnosti?","a":"Není ideální — algoritmus se složitostí n^1000000 rychlý není. Prakticky se ale ukazuje, že existuje-li pro problém z praxe polynomiální algoritmus, exponent bývá malý (pod 5). Navíc je třída P robustní: uzavřená na skládání (polynom polynomu je polynom) a nezávislá na výpočetním modelu, protože rozumné modely se simulují s polynomiální ztrátou.","kod":"7ZNA1/02","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Uměl byste uvést problém, který je dokazatelně nezvládnutelný?","a":"Ano — ekvivalence regulárních výrazů s mocněním (zápis (a)² místo a·a) je EXPSPACE-úplná, a tedy zaručeně mimo PTIME. Ještě těžší, superexponenciální, je rozhodování Presburgerovy aritmetiky (teorie sčítání). Naproti tomu NP-úplné a PSPACE-úplné problémy jsou nezvládnutelné jen prakticky — teoreticky rychlý algoritmus vyloučen není.","kod":"7ZNA1/02","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"Závisí třídy P a NP na tom, že jsme si za model zvolili Turingův stroj?","a":"Ne. Konkrétní složitost záviset může — slova wwᴿ rozpozná jednohlavý stroj nejlépe v řádu n², dvouhlavý lineárně — ale všechny rozumné modely algoritmů se vzájemně simulují s polynomiální ztrátou, takže polynomialita se zachovává a definice tříd P, NP i pojem NP-úplnosti vycházejí stejně.","kod":"7ZNA1/02","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-19"},{"q":"🗣️ 7ZNA1/02 — Řekni osnovu odpovědi","a":"Zatímco vyčíslitelnost odpovídá na otázku, CO lze algoritmicky řešit, teorie složitosti se ptá, JAK NÁROČNÉ to řešení je. Základní úkoly teorie: precizovat pojmy složitost algoritmu a složitost problému a pokud možno vymezit třídu prakticky zvládnutelných problémů. Projdu složitost Turingova stroje, asymptotické odhady, třídy složitosti, nedeterminismus a NP-úplnost s příklady.","kod":"7ZNA1/02","okruh":"7ZNA1","typ":"🗣️ Osnova","datum":"2026-07-19"},{"q":"Co je deviance a čemu odpovídá v klasickém modelu?","a":"Deviance je dvojnásobek rozdílu logaritmů věrohodnostních funkcí úplného modelu (který data vysvětluje přesně) a aktuálního modelu — v GLM přebírá roli reziduální sumy čtverců. Pro normální rozdělení s identickou spojovací funkcí je deviance přímo rovna RSS.","kod":"7ZNA1/03","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Co když rezidua nemají konstantní rozptyl?","a":"Jde o heteroskedasticitu — porušení předpokladu (2). Řeší se váženými nejmenšími čtverci (WLS): řádky dat se vydělí vahami úměrnými směrodatné odchylce pozorování, případně iterovaně (iterated WLS). Obecnější kovarianční strukturu řeší Aitkenův odhad, ale matici Ω v praxi neznáme.","kod":"7ZNA1/03","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Co ověřuje regresní diagnostika a jak poznám vlivné body?","a":"Ověřuje splnění předpokladů klasického modelu z reziduí — normalitu (QQ graf), konstantnost rozptylu, nekorelovanost. Vlivné body: leverage hᵢᵢ \u003e 2(k+1)/n signalizuje bod daleko od těžiště regresorů, Cookova vzdálenost Cᵢ ≥ 1 podstatný vliv na odhady b, jackknife reziduum nad cca 2 v absolutní hodnotě odlehlé pozorování.","kod":"7ZNA1/03","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Dokažte nestrannost OLS-odhadů.","a":"E(b) = E((XᵀX)⁻¹Xᵀy) = (XᵀX)⁻¹XᵀE(y) = (XᵀX)⁻¹XᵀXβ = β. Využívá se jen linearita střední hodnoty, nenáhodnost X a předpoklad E(ε) = 0, tedy E(y) = Xβ.","kod":"7ZNA1/03","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Jak interpretovat e^bᵢ?","a":"Je to odhad odds ratio: kolikrát se změní šance p/(1−p) při zvýšení regresoru xᵢ o jedničku, při konstantních ostatních regresorech (po adjustaci jejich vlivu). Pokud interval spolehlivosti exp[bᵢ ± u(1−α/2)·SE(bᵢ)] neobsahuje 1, je vliv regresoru významný.","kod":"7ZNA1/03","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Jak se pozná autokorelace reziduí?","a":"Vychází se z modelu AR(1) pro náhodnou složku; odhad ρ̂₁ testuje Waldův test (χ² s 1 stupněm volnosti) nebo Durbin–Watsonova statistika DW ≈ 2(1 − ρ̂₁), 0 ≤ DW ≤ 4. Hodnoty blízké 2 znamenají nekorelovaná rezidua; DW nemá snadno dostupné kvantily, používají se tabelované kritické hodnoty.","kod":"7ZNA1/03","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Jaké rozdělení má vysvětlovaná veličina v logistické regresi a co je logit?","a":"Alternativní (Bernoulliho) rozdělení Y ~ A(p) se střední hodnotou E(Y) = p. Logit je spojovací funkce logit(p) = ln(p/(1−p)) — logaritmus poměru šancí; model říká, že logit pravděpodobnosti je lineární funkcí regresorů.","kod":"7ZNA1/03","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Jaký je rozdíl mezi parametry a jejich odhady?","a":"Parametry β jsou pevné, leč neznámé konstanty modelu. Odhady b jsou náhodné veličiny — jsou funkcí náhodného vektoru y, takže mají své rozdělení a kovarianční matici σ²(XᵀX)⁻¹. Nový výběr dat dá jiné hodnoty odhadů, parametry se nemění.","kod":"7ZNA1/03","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Proč R² neklesá s přidáním regresoru a co s tím?","a":"Přidáním regresoru se RSS nikdy nezvýší (nový regresor lze vždy „vypnout“ nulovým koeficientem), takže R² = 1 − RSS/TSS neklesá. Proto se pro porovnávání modelů používá adjustovaný R²adj, který penalizuje počet parametrů, nebo Mallowsova Cp.","kod":"7ZNA1/03","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Proč se v krokové regresi volí F-to-remove menší než F-to-entry?","a":"Kdyby byla kritéria stejná, mohl by se tentýž regresor střídavě zařazovat a vyřazovat a algoritmus by se zacyklil. Nižší práh pro vyřazení (α₂ \u003e α₁) cyklu brání.","kod":"7ZNA1/03","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"🗣️ 7ZNA1/03 — Řekni osnovu odpovědi","a":"Regrese je nejčastěji aplikovaná statistická metoda — uvádí se, že 70–90 % aplikací statistiky je nějakou formou regrese; počátky metody nejmenších čtverců jsou doloženy už na začátku 19. století (Legendre, Gauss). Nejprve definuji klasický lineární model a jeho předpoklady, ukážu odhad parametrů metodou nejmenších čtverců a jeho vlastnosti, pak testy hypotéz o parametrech, posuzování vhodnosti modelu a výběr regresorů, a nakonec zobecnění — až k zobecněnému lineárnímu modelu a logistické regresi.","kod":"7ZNA1/03","okruh":"7ZNA1","typ":"🗣️ Osnova","datum":"2026-07-20"},{"q":"Co jsou vlastní čísla v PCA a jak zvolit počet komponent?","a":"Vlastní čísla λ1 ≥ … ≥ λp ≥ 0 kovarianční (korelační) matice jsou rozptyly jednotlivých hlavních komponent; jejich součet je celková variabilita, takže λi/Σλj je podíl variability vysvětlený i-tou komponentou. Počet komponent se volí orientačně: vlastní číslo větší než 1 (u korelační matice), zlom na scree plotu, nebo dosažení požadovaného kumulativního podílu (např. ve skriptech 2 komponenty = 62 %, 4 komponenty = 85 %).","kod":"7ZNA1/04","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Jak funguje k-means a proč nezaručuje globální optimum?","a":"Minimalizuje vnitroshlukovou variabilitu tr(W) při zadaném počtu shluků k: náhodně zvolí k těžišť, objekty přiřadí k nejbližšímu těžišti, těžiště přepočítá a opakuje, dokud se klasifikace mění. Najít globální minimum je algoritmicky obtížný problém neřešitelný v polynomiálním čase, Hartiganův algoritmus proto konverguje jen k lokálnímu minimu závislému na počáteční volbě těžišť — v praxi se spouští opakovaně, případně se užívají evoluční algoritmy.","kod":"7ZNA1/04","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Jak ověřit spolehlivost klasifikačního pravidla?","a":"Úspěšnost měřená na datech, z nichž se pravidlo počítalo, je nadhodnocená — pravidlo může být „ušito na míru\" (přeučení). Realističtější odhad dá rozdělení dat na učící a testovací skupinu (nevýhoda: parametry se počítají z méně pozorování), nebo jackknife procedura, kdy se pravidlo opakovaně spočte z n−1 objektů a ověří na vyjmutém objektu.","kod":"7ZNA1/04","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Jakou část celkové variability vysvětluje první hlavní komponenta?","a":"Podíl λ1/σ², kde σ² = Σλi je celková variabilita. Vychází-li se z korelační matice, je σ² = p, takže první komponenta vysvětluje λ1/p. Je to největší možný podíl, jaký může jediná normovaná lineární kombinace veličin vysvětlit, protože yᵀVy ≤ λ1 pro každý jednotkový vektor y.","kod":"7ZNA1/04","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Jaký je rozdíl mezi diskriminační a shlukovou analýzou?","a":"Obě klasifikují objekty, ale diskriminační analýza pracuje se známými skupinami — z dat se známou příslušností se učí pravidlo pro zařazování nových objektů („učení s učitelem\"). Shluková analýza skupiny předem nezná a teprve je v datech hledá jako podmnožiny podobných objektů („bez učitele\"). Liší se tedy vstupem (označená vs. neoznačená data) i cílem (predikce zařazení vs. objevení struktury).","kod":"7ZNA1/04","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Jaký je rozdíl mezi single a complete linkage a co je dendrogram?","a":"Single linkage spojuje shluky podle nejbližších sousedů — shluk tvoří souvislý podgraf, metoda je nejméně přísná, dává protáhlé shluky tvaru „souhvězdí\" a řetězí (k velkým shlukům připojuje jednotlivé objekty). Complete linkage spojuje podle nejvzdálenějších sousedů — shluk je úplný podgraf, metoda je nejpřísnější a dává kompaktní, vyrovnanější shluky. Dendrogram je stromový graf průběhu spojování; řez v určité úrovni nepodobnosti dá konkrétní rozklad na shluky.","kod":"7ZNA1/04","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Kdy je LDF optimální a co dělat, když se kovarianční matice skupin liší?","a":"LDF je optimální rozhodovací pravidlo, když má x v obou skupinách vícerozměrné normální rozdělení a skupiny se liší jen vektorem středních hodnot, nikoli kovarianční strukturou (Σ1 = Σ2). Liší-li se kovarianční matice, kvadratický člen z odvození neodpadne a optimální je kvadratická diskriminační funkce. Alternativou bez přísných předpokladů je logistická regrese.","kod":"7ZNA1/04","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Proč se před diskriminační analýzou dělá Hotellingův T² test?","a":"Je to mnohorozměrná analogie dvouvýběrového t-testu — testuje hypotézu shody vektorů středních hodnot μ1 = μ2. Pokud se skupiny ve středních hodnotách významně neliší, nemá smysl LDF konstruovat, protože β = Σ⁻¹(μ1 − μ2) by nic neoddělovalo. Test předpokládá normalitu a shodu kovariančních matic, z nichž se počítá společná výběrová matice S.","kod":"7ZNA1/04","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"Proč se před shlukováním standardizují data?","a":"Eukleidovská vzdálenost závisí na měřítku: veličina s velkými čísly (např. příjem v korunách) by přehlušila veličiny s malými hodnotami (např. věk). Po standardizaci mají všechny veličiny jednotkový rozptyl, takže do vzdálenosti přispívají srovnatelně a výsledné shluky nezávisejí na volbě jednotek. Ze stejného důvodu se v PCA většinou vychází z korelační místo kovarianční matice.","kod":"7ZNA1/04","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"V čem se liší PCA a faktorová analýza?","a":"PCA vysvětluje celkový rozptyl (diagonálu korelační matice) pomocí nekorelovaných lineárních kombinací pozorovaných veličin — je to přímý výpočet z vlastních čísel a vektorů. Faktorová analýza vysvětluje korelační strukturu (mimodiagonální prvky) modelem Z = FAᵀ + E s malým počtem skrytých faktorů; pracuje s komunalitami a zátěže se rotují (VARIMAX) k interpretovatelné jednoduché struktuře. PCA je transformace dat, faktorová analýza je statistický model s latentními veličinami.","kod":"7ZNA1/04","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-20"},{"q":"🗣️ 7ZNA1/04 — Řekni osnovu odpovědi","a":"Zatímco regrese vysvětluje jednu veličinu pomocí jiných, mnohorozměrné metody pracují s celým vektorem veličin. Nejprve zarámuji dvě skupiny úloh: klasifikaci — kde rozlišíme situaci se známými skupinami (diskriminační analýza, „učení s učitelem\") a hledání skupin neznámých (shluková analýza, „bez učitele\") — a redukci dimenze, kde představím analýzu hlavních komponent. U každé metody řeknu základní princip a oblast aplikace.","kod":"7ZNA1/04","okruh":"7ZNA1","typ":"🗣️ Osnova","datum":"2026-07-20"},{"q":"Co je expertní systém a jak souvisí s reprezentací znalostí?","a":"Expertní systém je inteligentní počítačový program, který užívá znalosti a inferenční procedury k řešení problémů natolik obtížných, že vyžadují významnou lidskou expertízu. Znalost je jeho klíčovým prvkem – kvalita systému stojí na vhodně zvoleném reprezentačním schématu (typicky pravidla, případně kombinace s rámci) a na znalostní bázi naplněné znalostní akvizicí od expertů.","kod":"7ZNA1/05","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Co je extenze a intenze konceptu?","a":"Extenze je výčet prvků, které konceptu náležejí – denotát příslušného predikátu v dané interpretační struktuře (denotační sémantika); např. extenze konceptu malé_přirozené_číslo může být množina 1, 2, 3. Intenze je formální specifikace vlastností konceptu formulí reprezentačního jazyka (axiomatická sémantika). Ve formální konceptové analýze tvoří extenze a intenze dualitu zvanou Galoisovo spojení.","kod":"7ZNA1/05","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Co je Tbox a Abox znalostní báze?","a":"Tbox obsahuje terminologické znalosti – definice konceptů a jejich vzájemných vztahů (např. prodavač_bot je prodavač, který prodává boty zákazníkům). Abox obsahuje tvrzení o instancích – o příslušnosti konkrétních objektů konceptům a rolím (Rudolf prodává holínky Luďkovi). Někdy se odděluje ještě Rbox s informacemi o rolích a jejich závislostech.","kod":"7ZNA1/05","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Čím se liší RDFS a OWL?","a":"RDFS poskytuje jen nejzákladnější prostředky: definování tříd, vlastností a jejich hierarchií. Neumí definovat omezení ani odvozovat. OWL staví na RDF(S) a deskripční logice – umožňuje skládat koncepty logickými kompozicemi, vyjadřovat omezení na třídách a díky formální sémantice odvozovat logické důsledky ontologie, tedy tvrzení, která v ní nejsou přímo zapsána.","kod":"7ZNA1/05","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Jaká jsou hlavní omezení sémantických sítí?","a":"Sítě disponují pouze binárními predikáty, takže vztahy s více argumenty vyžadují pomocné uzly. Obtížně se vyjadřuje negace a disjunkce a chybí prostředky pro univerzální a existenční kvantifikaci. Řešením jsou segmentové sítě, nebo převod do klauzulárního tvaru, kde proměnné velkým písmenem jsou univerzálně vázané a existenční vazbu řeší skolemizace na existenční termy.","kod":"7ZNA1/05","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Jaký je rozdíl mezi daty, informacemi a znalostmi?","a":"Data jsou znakové řetězce bez interpretace, tedy bez přiřazeného významu. Informace vzniká interpretací dat – smysluplným přiřazením sémantiky (např. doplněním záhlaví k tabulce čísel). Znalost je informace, která je použitelná a začlenitelná či odvoditelná v souvislosti s jinými informacemi, typicky obohacená metadaty a širším kontextem.","kod":"7ZNA1/05","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Jaký je rozdíl mezi vztahy isa a ako v sémantické síti?","a":"Vztah isa (is a) spojuje instanci s konceptem – např. lev isa šelma říká, že konkrétní lev je instancí třídy šelem. Vztah ako (a kind of) spojuje subkoncept s nadřazeným konceptem – velká_kočka ako šelma říká, že velké kočky jsou podtřídou šelem. Přes obě hierarchie se dědí vlastnosti a odvozuje se generalizací a specializací.","kod":"7ZNA1/05","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Proč je v RDF všechno identifikováno pomocí URI a co jsou prázdné uzly?","a":"URI zajišťuje jednotnou a jednoznačnou identifikaci zdrojů napříč celým webem – cokoli, co má URI-odkaz, je považováno za zdroj náležející webu, a predikáty (návěští hran) jsou vždy URI. Prázdné uzly jsou uzly bez návěští a mají charakter existenčních proměnných: tvrzení s prázdným uzlem říká, že existuje zdroj, jehož dosazením (substitucí jména) se tvrzení stane pravdivým bázovým tvrzením.","kod":"7ZNA1/05","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Vyjmenujte vrstvy architektury sémantického webu.","a":"Odspodu: URI (jednotné kódování zdrojů); XML a jmenné prostory (syntaktický standard); model RDF (datový model tvrzení); ontologie s RDFS a OWL (sémantika a dedukce); vrstva pravidel (odvozování nových dat); věrohodnost (spolehlivost vyhledaných i odvozených informací). Vrstvy na sebe navazují – každá vyšší využívá služeb nižší.","kod":"7ZNA1/05","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"🗣️ 7ZNA1/05 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím, co je reprezentace znalostí, jak souvisí se zpracováním znalostí v umělé inteligenci a jaké jsou její hlavní metody. Poté metody roztřídím na pravidlové, nepravidlové a hybridní systémy. Dále se zaměřím na sémantické sítě jako grafovou reprezentaci a ukážu, jak na jejich myšlenku navazuje vize sémantického webu. Nakonec vysvětlím roli formálních ontologií a popíšu RDF model včetně trojic, RDFS a vztahu k jazyku OWL.","kod":"7ZNA1/05","okruh":"7ZNA1","typ":"🗣️ Osnova","datum":"2026-07-21"},{"q":"Co je přeučení a jak mu předejít?","a":"Přeučení nastane, když se model příliš přizpůsobí trénovacím datům včetně šumu — na trénovacích datech je přesný, ale na nových selhává. Ze zdrojů: málo dat znamená nedostatečnou spolehlivost, moc přizpůsobení znamená přeučení. Předchází se mu vyváženými, mělčími stromy (prořezávání), dostatkem dat a vyhodnocováním na oddělených testovacích datech.","kod":"7ZNA1/06","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Co je TBox a ABox znalostní báze?","a":"V deskripční logice se znalostní báze dělí na dvě části: TBox je terminologický box — množina axiomů o konceptech a jejich vztazích (definice a subsumpce konceptů, tedy obecné znalosti o doméně), zatímco ABox je assertional box — tvrzení o konkrétních individuích, tedy fakta typu příslušnost objektu ke konceptu C(a) nebo k roli R(a,b).","kod":"7ZNA1/06","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Čím se znalostní systém liší od běžného programu?","a":"Znalosti jsou v něm uloženy explicitně a odděleně od řídicího mechanismu — změna znalostí nevyžaduje přeprogramování, jen úpravu báze. Systém navíc umí vysvětlit, jak k závěru došel (vysvětlovací modul), a zvládá i neúplné či nejisté informace, což klasický algoritmus s pevně zadrátovanou logikou neumí.","kod":"7ZNA1/06","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Jak se hodnotí kvalita asociačního pravidla?","a":"Podporou — jak často lze pravidlo použít (podíl transakcí obsahujících předpoklad i závěr ze všech transakcí), spolehlivostí — jak moc se lze na závěr spolehnout (podíl mezi transakcemi splňujícími předpoklad) a zlepšením — poměr skutečné společné pravděpodobnosti k součinu pravděpodobností; hodnota nad 1 znamená, že pravidlo je lepší než náhodná volba.","kod":"7ZNA1/06","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Jaké fáze má metodika CRISP-DM?","a":"Šest fází bez pevně určeného pořadí: pochopení businessu (cíle, požadavky), pochopení dat (prvotní sběr), příprava dat (čištění, transformace), modelování (analytické metody dobývání znalostí), evaluace (vyhodnocení výsledků) a deployment (úprava znalostí pro zákazníka, nasazení do praxe). Výsledky každého kroku ovlivňují kroky další, proces je iterativní.","kod":"7ZNA1/06","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Jaký je rozdíl mezi dopředným a zpětným řetězením?","a":"Dopředné řetězení vychází z faktů a aplikuje pravidla, dokud neodvodí nové závěry — hodí se, když máme data a nevíme, k čemu povedou (monitorování, konfigurace). Zpětné řetězení vychází z hypotézy (cíle) a hledá pravidla a fakta, která ji potvrdí — hodí se pro diagnostiku, kde ověřujeme konkrétní podezření. Mnoho systémů oba přístupy kombinuje.","kod":"7ZNA1/06","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Proč je RETE rychlý a jakou má nevýhodu?","a":"Rychlost plyne ze dvou principů: propagují se jen změny pracovní paměti (temporální redundance), takže se mezi cykly nepočítá vše znovu, a pravidla sdílejí společné podmínky jako sdílené uzly sítě (strukturální podobnost). Nevýhodou je paměťová náročnost — síť udržuje paměti všech dílčích shod, jde tedy o výměnu paměti za čas.","kod":"7ZNA1/06","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"Uveďte konkrétní příklad blackboard systému.","a":"Klasikou je Hearsay-II pro rozpoznávání souvislé řeči: na tabuli se udržují hypotézy na úrovních signál, fonémy, slabiky, slova a věty a nezávislé znalostní zdroje (akustický, lexikální, syntaktický) je oportunisticky zpřesňují — kombinuje se postup od dat nahoru i od hypotéz dolů, dokud nevznikne konzistentní interpretace celé promluvy.","kod":"7ZNA1/06","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-21"},{"q":"🗣️ 7ZNA1/06 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím, co je znalostní (expertní) systém, a popíšu jeho návrh a architekturu — bázi znalostí, inferenční mechanismus, vysvětlovací modul a akvizici znalostí. Potom se zaměřím na dva důležité mechanismy z oblasti inference: RETE algoritmus pro efektivní vyhodnocování pravidel a architekturu typu tabule (blackboard). Nakonec přejdu k automatickému získávání znalostí — strojovému učení a dolování dat, kde popíšu proces dobývání znalostí z databází a jeho základní úlohy.","kod":"7ZNA1/06","okruh":"7ZNA1","typ":"🗣️ Osnova","datum":"2026-07-21"},{"q":"Co říká Kerckhoffův princip a proč je důležitý?","a":"Byl popsán už roku 1883: kryptografický systém je bezpečný, když útočník není schopen dešifrovat text, ani když dokonale zná postup šifrování — důvěrnost zajišťuje výhradně znalost klíče. Řídí se jím všechny moderní kryptosystémy (algoritmy AES i RSA jsou veřejné). Shannon jej později přeformuloval jako „The enemy knows the system\".","kod":"7ZNA1/07","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Existuje absolutně bezpečná šifra?","a":"Ano, Vernamova šifra (one-time pad) — prokazatelně nerozluštitelná i s neomezenou výpočetní silou. Klíč musí být skutečně náhodný, stejně dlouhý jako zpráva, přenesený bezpečným kanálem a použitý jen jednou; šifruje se XOR bit po bitu. Právě nutnost distribuce jednorázových dlouhých klíčů ji činí v praxi téměř nepoužitelnou.","kod":"7ZNA1/07","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Jak je Diffie-Hellman zranitelný a jak se to řeší?","a":"Hlavní hrozbou je man-in-the-middle: útočník si vytvoří samostatné spojení s každou stranou, s každou se dohodne na vlastním klíči a komunikaci přeposílá a čte. Protokol totiž sám o sobě neautentizuje účastníky — řešením je autentizace výměny, v praxi digitální podpisy a certifikáty (PKI), jak to dělá TLS. Druhé riziko je volba slabého prvočísla q.","kod":"7ZNA1/07","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Jak přesně funguje hybridní kryptosystém, např. v TLS?","a":"Náhodně se vygeneruje symetrický klíč relace. Ten se zašifruje asymetricky (veřejným klíčem příjemce — RSA, nebo se dohodne přes Diffie-Hellman) a doručí druhé straně; příjemce ho dešifruje svým soukromým klíčem. Vlastní data se pak šifrují rychlou symetrickou šifrou (AES). Spojuje se tak bezpečná výměna klíče s rychlostí symetrické kryptografie — HTTPS, PGP, S/MIME.","kod":"7ZNA1/07","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Jaký je rozdíl mezi kolizí 1. a 2. řádu u hashovacích funkcí?","a":"Kolize 1. řádu znamená nalezení dvou libovolných různých zpráv, které generují stejný hash — díky narozeninovému paradoxu stačí cca 2^(n/2) pokusů, proto je snazší. Kolize 2. řádu znamená k danému hashi či dané konkrétní zprávě najít (jinou) předlohu se stejným hashem — to je výrazně náročnější. Pro digitální podpisy je kritická odolnost proti oběma.","kod":"7ZNA1/07","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Proč je režim ECB nevhodný a co použít místo něj?","a":"V ECB se každý blok šifruje samostatně, takže stejný blok otevřeného textu dá se stejným klíčem vždy stejný šifrový text — vzory v datech zůstávají viditelné a umožňují statistickou analýzu. Vhodnější je CBC, kde šifrování bloku závisí na předchozím bloku a inicializačním vektoru, případně CTR s jedinečnou hodnotou nonce; pro disky XTS.","kod":"7ZNA1/07","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Proč se hash nedá „dešifrovat\" a jak se přesto útočí na hesla?","a":"Hash není šifrování — je to jednosměrná ztrátová transformace bez klíče a bez inverzní operace; z otisku pevné délky nelze rekonstruovat libovolně dlouhý vstup. Útočí se proto hrubou silou nebo předpočítanými rainbow tabulkami (seznamy hesel dané délky a jejich hashů). Obranou je solení hesel a pomalé hashovací funkce.","kod":"7ZNA1/07","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Proč se už nemá používat MD5 a SHA-1?","a":"Obě funkce jsou kompromitované — pro MD5 byla v roce 2005 publikována rychlá metoda hledání konkrétních kolizí, takže lze vytvořit dvě různé zprávy se stejným otiskem, což ničí důvěryhodnost podpisů a kontrol integrity. Doporučuje se SHA-2 (typicky SHA-256), která je považována za bezpečnou.","kod":"7ZNA1/07","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"🗣️ 7ZNA1/07 — Řekni osnovu odpovědi","a":"Nejprve vymezím rozdíl mezi kódováním a šifrováním a ukážu základní rozdělení šifrovacích algoritmů — podle klíče, podle způsobu manipulace se znaky a podle způsobu zpracování textu. Poté vysvětlím pojem hash a vlastnosti, které musí kryptografická hashovací funkce splňovat. Ve třetí části porovnám klasické transpoziční a transkripční šifry (monoalfabetické a polyalfabetické) a moderní blokové a proudové systémy včetně konkrétních algoritmů. Nakonec porovnám symetrickou kryptografii na příkladu AES s asymetrickou na příkladech RSA a Diffie-Hellman a shrnu jejich výhody, nevýhody a spojení v hybridním kryptosystému.","kod":"7ZNA1/07","okruh":"7ZNA1","typ":"🗣️ Osnova","datum":"2026-07-22"},{"q":"Co se stane při kompromitaci soukromého klíče certifikační autority?","a":"Je to jeden z definovaných důvodů revokace na straně CA (kód caCompromise). Musely by se revokovat všechny certifikáty, které daná CA podepsala, protože útočník by mohl vydávat falešné certifikáty — padá celá větev řetězu důvěry pod touto CA. Proto se soukromé klíče kořenových CA drží offline a podepisuje se přes mezilehlé CA.","kod":"7ZNA1/08","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Jak funguje důvěra v PGP, když neexistují certifikační autority?","a":"PGP má plně decentralizovaný model — síť důvěry (web of trust). Každý uživatel je vlastně sám sobě CA: generuje vlastní PGP certifikáty a podepisováním potvrzuje klíče jiných uživatelů, s různými stupni důvěry. První výměna klíčů by měla proběhnout osobně (organizují se „key signing party“), nebo se důvěra přenáší přes prostředníka, kterému osobně věřím. Důvěra je proto často omezena na komunitu a není automatická.","kod":"7ZNA1/08","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Jak příjemce zjistí, že certifikát odesílatele nebyl odvolán?","a":"Buď stáhne CRL — seznam sériových čísel revokovaných certifikátů podepsaný certifikační autoritou, který se obnovuje typicky jednou za 24 hodin — nebo se online zeptá OCSP responderu dané CA (protokol dotaz–odpověď přes HTTP, stavy good/revoked/unknown). OCSP je úspornější a aktuálnější; existuje i OCSP stapling, kdy odpověď dodá přímo server.","kod":"7ZNA1/08","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Jaký je rozdíl mezi zaručeným a kvalifikovaným elektronickým podpisem?","a":"Oba pojmy definuje eIDAS. Zaručený (zdokonalený) podpis musí zajistit bezpečnostní cíle (integritu, autenticitu, nepopiratelnost), ale nezaručuje automaticky právní přijatelnost. Kvalifikovaný podpis je navíc vytvořen kvalifikovaným prostředkem — kvalifikovaný certifikát se soukromým klíčem je na vyhrazeném médiu (např. občanka s čipem) a nelze jej exportovat — a je v celé EU právně ekvivalentní vlastnoručnímu podpisu.","kod":"7ZNA1/08","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"K čemu je časové razítko a proč nestačí čas z počítače?","a":"Časové razítko garantuje, že dokument v podepsané podobě existoval v čase podpisu. Čas z počítače lze snadno podvrhnout, proto se čas bere z externí důvěryhodné časové autority (TSA) — technicky jde o další elektronický podpis hashe dokumentu od TSA. Kvalifikované razítko vyžaduje eIDAS pro veřejnou správu; kvůli expiraci certifikátů razítek se musí udržovat digitální kontinuita (úroveň LTA).","kod":"7ZNA1/08","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Není hybridní kryptosystém slabší než čistě asymetrický systém?","a":"Není — bezpečnost je dána bezpečností obou složek. Symetrický klíč relace je náhodně vygenerovaný a jednorázový, takže útočník musí prolomit buď symetrickou šifru (AES), nebo asymetrickou ochranu klíče (RSA/DH). Naopak čistě asymetrické šifrování celých dat by bylo neprakticky pomalé; proto hybridní model používají HTTPS/TLS, PGP i S/MIME.","kod":"7ZNA1/08","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Proč PGP používá dva páry klíčů, zatímco S/MIME jen jeden?","a":"RSA umožňuje použít tentýž pár na podpis i šifrování, protože role klíčů lze „vyměnit“ — toho využívá S/MIME. PGP z bezpečnostních důvodů odděluje pár pro podepisování a pár pro šifrování; oba se vygenerují najednou při vytvoření PGP certifikátu. Oddělení znamená, že kompromitace šifrovacího klíče neohrozí platnost podpisů a naopak.","kod":"7ZNA1/08","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"Proč se podepisuje hash dokumentu, a ne dokument celý?","a":"Asymetrické operace (RSA) jsou výpočetně pomalé a délka podpisu by rostla s délkou dokumentu. Hash má pevnou krátkou délku, takže je podpis rychlý a kompaktní, a díky bezkoliznosti hashovací funkce reprezentuje otisk dokument jednoznačně — změna jediného bitu dokumentu změní hash, a podpis tak přestane sedět.","kod":"7ZNA1/08","okruh":"7ZNA1","typ":"🔍 Detail","datum":"2026-07-22"},{"q":"🗣️ 7ZNA1/08 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím obecný princip elektronického, resp. digitálního podpisu — tedy kombinaci hashovací funkce a asymetrické kryptografie — a ukážu, jak se používá při podepisování dokumentů, typicky PDF, včetně časových razítek a standardů PAdES. Potom přejdu k e-mailu: popíšu, jak probíhá podpis a šifrování zprávy v S/MIME a PGP a čím se oba přístupy liší. U šifrování vysvětlím koncept hybridního kryptosystému, který oba protokoly používají. Na závěr objasním pojem digitální certifikát a celou infrastrukturu veřejných klíčů (PKI) — obsah certifikátu, certifikační autority, vydávání, ověřování a revokaci.","kod":"7ZNA1/08","okruh":"7ZNA1","typ":"🗣️ Osnova","datum":"2026-07-22"},{"q":"Co je simulační pokus a simulační studie?","a":"Simulační pokus (simulation experiment) je jeden pokus se simulačním modelem — začíná se simulovaným časem od výchozí hodnoty (obvykle nuly). Simulační studie je cílená posloupnost simulačních pokusů se stejným účelem, např. hledání optimální varianty továrny; typicky běží jako cyklus: příprava parametrů, provedení pokusu, zhodnocení výsledků, rozhodnutí o pokračování.","kod":"7ZNA2/01","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Co je to simulární (simulovaný) čas a jaké podmínky musí splňovat?","a":"Je to aritmetická proměnná v modelu, která zobrazuje čas simulovaného systému. Její hodnota nesmí během simulačního pokusu klesat a děje v modelu na ní musí záviset stejně, jako jejich vzory závisejí na přirozeném toku času v původním systému. Není totéž co reálný čas výpočtu; pokud oba rostou prakticky shodně, mluvíme o simulaci v reálném čase.","kod":"7ZNA2/01","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Co je to událost v diskrétní simulaci?","a":"Událost je změna stavu dynamického systému, která se chápe jako elementární a okamžitá — má nulovou dobu trvání. V diskrétní simulaci se stav systému mění jen v konečně mnoha okamžicích, právě v okamžicích událostí; simulační jádro je plánuje v kalendáři událostí a simulární čas mezi nimi skáče.","kod":"7ZNA2/01","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Co jsou transakce a permanentní prvky systému?","a":"Transakce (dočasné prvky) jsou prvky, které do systému vstupují z jeho okolí a zase ho opouštějí — zákazníci, pacienti, zakázky, vozidla. Permanentní prvky (aktivity) jsou v systému po celou jeho existenci — např. stroje či obslužné linky. Jakmile transakce systém opustí, je z uvažování ztracena; jednou z vlastností abstrakce je, že okolí systému pro nás „neexistuje“.","kod":"7ZNA2/01","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Jak se řeší spojitá simulace na číslicovém počítači, když je počítač diskrétní stroj?","a":"Spojitý model popsaný diferenciálními rovnicemi se řeší numerickou integrací: simulární čas se diskretizuje na integrační kroky a metody typu Rungeho-Kutty nebo víceuzlové metody počítají posloupnost aproximací řešení. Přestože uvnitř počítače tak vzniká diskrétní systém, stále jde o spojitou simulaci — přívlastek se řídí charakterem simulovaného systému, ne děním v simulátoru.","kod":"7ZNA2/01","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Jaký je rozdíl mezi simulací a emulací?","a":"U simulace je cílem experimentů se simulátorem získat informace o původním simulovaném systému — jde o výzkumnou techniku. Emulace je pouhá náhrada systému jiným systémem bez cíle poznání: např. simulátor nedostupného počítače, který slouží jen k tomu, abychom mohli spouštět jeho programy. Rozdíl tedy není v technice, ale v účelu.","kod":"7ZNA2/01","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Jaký je rozdíl mezi verifikací a validací modelu?","a":"Verifikace ověřuje správnost modelu — vztah mezi abstraktním návrhem a konkrétní implementací (nejsou tam programátorské chyby či nevhodná numerická metoda?); usilujeme o 100% shodu a lze ji provádět exaktně. Validace ověřuje pravdivost modelu — vztah mezi návrhem a realitou (reflektuje model chování reálné věci?); usilujeme o maximální, ne stoprocentní shodu a je do jisté míry subjektivní, protože žádný model plně neodpovídá realitě.","kod":"7ZNA2/01","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Může být na jedné věci definováno více systémů?","a":"Ano — systém je abstrakce a záleží na profesi a hledisku, které ji na věci zavádí. Televizor je pro elektronika elektronický systém, pro architekta či notáře něco jiného; procesor lze zkoumat spojitou simulací (polovodičová fyzika) i diskrétní simulací (hradlová logika). S tím souvisí i volba rozlišovací úrovně abstrakce.","kod":"7ZNA2/01","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"🗣️ 7ZNA2/01 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím, co je simulace a modelování jako výzkumná technika a k čemu slouží. Potom rozeberu trojici pojmů věc – systém – model a ukážu, že systém je abstrakce definovaná na věci a model je vztah mezi dvěma systémy. Dále projdu fáze procesu simulace od vymezení objektu poznání přes realizaci modelu až po verifikaci, validaci a simulační experimenty. Nakonec porovnám diskrétní a spojitou číslicovou simulaci — čím se liší v pojetí času a stavových změn a kde se která používá.","kod":"7ZNA2/01","okruh":"7ZNA2","typ":"🗣️ Osnova","datum":"2026-07-23"},{"q":"Co je integrační krok a jak jeho volba ovlivňuje výpočet?","a":"Integrační krok h je vzdálenost sousedních okamžiků, v nichž se počítá numerické řešení (h = tᵢ₊₁ − tᵢ). Menší krok znamená vyšší přesnost (numerické řešení konverguje pro h → 0 k exaktnímu), ale delší dobu výpočtu; příliš velký krok může vést k nestabilitě metody. Proto je řízení délky kroku jedním z hlavních problémů spojité simulace.","kod":"7ZNA2/02","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Co je to událost a jaký má vztah k procesu?","a":"Událost je elementární a okamžitá změna stavu (s nulovou dobou trvání). Proces je posloupnost logicky na sebe navazujících událostí — jednotlivé události procesu jsou odděleny plánovacími příkazy, které proces potlačí a předají řízení jinému procesu. Při reaktivaci proces pokračuje od reaktivačního bodu, ne od začátku.","kod":"7ZNA2/02","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Co jsou tuhé (stiff) soustavy a čím jsou problematické?","a":"Soustavy, jejichž vlastní čísla Jacobiho matice se řádově liší (tuhostní poměr typicky 10³ až 10⁶) a mají záporné reálné části. Běžné metody by u nich kvůli stabilitě vyžadovaly extrémně malý integrační krok. Řeší se A-stabilními metodami, jejichž oblast absolutní stability je celá levá polorovina — např. implicitní Eulerovou nebo lichoběžníkovou metodou.","kod":"7ZNA2/02","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Čím se liší Eulerova metoda od metod Rungeho–Kutty vyšších řádů?","a":"Eulerova metoda je nejjednodušší jednouzlová metoda 1. řádu: yₙ₊₁ = yₙ + h·f(tₙ, yₙ) — používá jediné vyčíslení f. Metody Rungeho–Kutty vyšších řádů vyčíslují f vícekrát, i v bodech mezi uzly, a kombinují tato vyčíslení tak, aby řešení souhlasilo s Taylorovým rozvojem až do P-té mocniny h — jsou tedy podstatně přesnější při stejném kroku. Přesnost se odhaduje metodou polovičního kroku.","kod":"7ZNA2/02","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Jaké čtyři základní funkce musí kalendář událostí zabezpečovat?","a":"1) Zjistit, zda je daná událost naplánována, a případně hodnotu jejího aktivačního času; 2) vybrat proces s minimálním aktivačním časem (při shodě s nejvyšší prioritou); 3) naplánovat momentálně nenaplánovanou událost; 4) zrušit plán naplánované události. Tím kalendář realizuje časové plánování událostí.","kod":"7ZNA2/02","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Jaký je rozdíl mezi časovým a podmínkovým plánováním?","a":"Časové (imperativní) plánování váže aktivaci události na dosažení určité hodnoty simulárního času — testuje se jen čas. Podmínkové (interrogativní) plánování váže aktivaci na splnění podmínky týkající se stavu systému nebo konfigurace časových plánů — jádro musí podmínky testovat a vybrat událost, jejíž podmínka je splněna (nemusí existovat žádná).","kod":"7ZNA2/02","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Jaký je rozdíl mezi posunem času u diskrétní a spojité simulace?","a":"U diskrétní simulace čas skáče nerovnoměrně od události k události (next-event) — mezi událostmi se stav nemění, takže se tam nepočítá. U spojité simulace se čas posouvá o délku integračního kroku h, tedy po malých, zpravidla pravidelných krocích daných zvolenou integrační metodou a požadovanou přesností.","kod":"7ZNA2/02","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Může být aktivních více procesů najednou? Jak se tedy modeluje paralelnost?","a":"Ne, v každém okamžiku výpočtu může být aktivní nejvýše jeden proces. Paralelně probíhající děje se modelují kvaziparalelně: procesy se střídají — po potlačení aktivního procesu se aktivuje ten, který je naplánován k vyvolání nejdříve. Díky tomu lze simultánní děje modelovat sekvenčními instrukcemi na jednoprocesorovém počítači.","kod":"7ZNA2/02","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Proč nesmí uživatel měnit hodnotu simulárního času?","a":"Protože by tím porušil základní podmínky kladené na simulární čas — jeho hodnota nesmí v průběhu výpočtu klesat a děje v modelu na něm musí záviset stejně jako ve výchozím systému. Zásah uživatele by rozbil synchronizaci stavových změn a kauzalitu (mohla by se provést událost v „minulosti\"). Proto jazyky dovolují čas jen číst, měnit jej smí výhradně jádro.","kod":"7ZNA2/02","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"Proč se pro kalendář hodí kruhový spojový seznam s hlavou?","a":"Kalendář vyžaduje časté vkládání prvků doprostřed seznamu (podle aktivačního času) a vyjímání z čela. Dvousměrný kruhový seznam umožňuje efektivní vkládání i vyjímání, protože každý prvek zná předchůdce i následníka, a hlava seznamu (head) — prvek, který se nikdy nevyřazuje — elegantně odstraňuje okrajové případy při vkládání prvního a vypouštění posledního prvku.","kod":"7ZNA2/02","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-23"},{"q":"🗣️ 7ZNA2/02 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím, co je simulační jádro, jaké má úkoly a jak pracuje se simulárním (modelovým) časem na principu next-event. Potom popíšu algoritmizaci diskrétních simulačních modelů, kde je jádro postaveno na událostech, procesech a kalendáři událostí, a proti tomu postavím algoritmizaci spojitých modelů, která stojí na numerické integraci soustav diferenciálních rovnic s integračním krokem. Nakonec podrobně rozeberu procesy a jejich čtyři vnější stavy včetně přechodů mezi nimi a strukturu, funkce a implementace kalendáře událostí včetně plánování událostí.","kod":"7ZNA2/02","okruh":"7ZNA2","typ":"🗣️ Osnova","datum":"2026-07-23"},{"q":"Co je perioda kongruenčního generátoru a čím je omezena?","a":"Je to délka úseku, po kterém se posloupnost začne opakovat — protože generátor pracuje modulo m, může nabýt nejvýše m různých hodnot, a perioda je tedy vždy menší nebo rovna modulu m. Proto se volí velký modul a vhodné konstanty; např. generátor v SIMULE (U[i+1] = U[i]·5^(2p+1) mod 2^n) má při lichém kladném semínku periodu 2^(n−2).","kod":"7ZNA2/03","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-24"},{"q":"Co přesně znamená písmeno M v zápisu M/M/1 a proč je exponenciální rozdělení tak časté?","a":"M značí markovské (exponenciální) rozdělení — první M pro intervaly mezi příchody (vstup je pak Poissonův tok), druhé M pro dobu obsluhy, 1 je jedna obslužná linka. Exponenciální rozdělení je oblíbené pro svou „bezpaměťovost\": pravděpodobnost příchodu dalšího požadavku nezávisí na tom, jak dlouho už žádný nepřišel, což dobře odpovídá nezávislým příchodům zákazníků a výrazně zjednodušuje analytické řešení.","kod":"7ZNA2/03","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-24"},{"q":"Jak byste otestovali kvalitu generátoru pseudonáhodných čísel?","a":"Vždy kombinací více testů, protože každý hodnotí jinou vlastnost. Frekvenční test ověřuje rovnoměrnost — interval ⟨0,1) rozdělím na M subintervalů a porovnám experimentální četnosti s teoretickými; testy autokorelace ověřují nezávislost — autokorelace řádů 1 až m mají být co nejmenší; sériový test kombinuje obojí — frekvenční test se provádí nad m-ticemi po sobě jdoucích čísel.","kod":"7ZNA2/03","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-24"},{"q":"Jak vygenerujete pseudonáhodná čísla z normálního rozdělení?","a":"Využiji centrální limitní větu: součet dostatečně mnoha rovnoměrně rozdělených veličin má přibližně normální rozdělení. Prakticky sečtu 12 čísel z rovnoměrného rozdělení na ⟨0,1) a odečtu 6 — výsledek má střední hodnotu 0 a rozptyl 1, tedy přibližně N(0,1). Inverzní metoda tu přímo nejde, protože distribuční funkce normálního rozdělení nemá inverzi v uzavřeném tvaru.","kod":"7ZNA2/03","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-24"},{"q":"Jaké provozní charakteristiky systému hromadné obsluhy simulací odhadujeme a jak spolu souvisí?","a":"Střední počet zákazníků v obsluze ES, ve frontě EL a v systému EK, přičemž platí EK = ES + EL; dále střední dobu čekání ve frontě EW, střední dobu pobytu v systému ET, pravděpodobnost odmítnutí zákazníka (podíl odmítnutých ku všem příchozím) a využití systému κ (průměrné vytížení linek). Z jednoho simulačního pokusu jde o bodové odhady; pro praxi se z více nezávislých pokusů konstruují intervalové odhady.","kod":"7ZNA2/03","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-24"},{"q":"Jaký je rozdíl mezi facilitou a skladem?","a":"Facilita je v každém okamžiku schopna interagovat (obsloužit) nejvýše jednu transakci — je buď volná, nebo obsazená. Sklad obslouží najednou více transakcí až do své kapacity, takže může být i „částečně obsazený\" — má k volných a m obsazených míst. Formálně je facilita skladem s kapacitou 1, v praxi se ale oba pojmy rozlišují.","kod":"7ZNA2/03","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-24"},{"q":"Jaký je rozdíl mezi jazyky typu AT a TA a co je kvaziparalelní systém?","a":"Oba popisují systémy typu AT (aktivity + transakce), liší se tím, kdo nese děj: v jazycích typu AT se popisují životní pravidla tříd transakcí (typicky GPSS), v jazycích typu TA nesou algoritmy aktivity, které s pasivními transakcemi „pohrávají\". Kvaziparalelní systém je souhrn prostředků pro deterministické přepínání výpočtu mezi několika algoritmy ve společném simulovaném čase — je zabudován v jazycích typu AT/TA a běžné jazyky (Pascal, C, Java) ho nenabízejí.","kod":"7ZNA2/03","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-24"},{"q":"Proč počítač nemůže generovat pravá náhodná čísla a jak se pravá náhodná čísla získávají?","a":"Softwarový generátor počítá posloupnost deterministicky podle daného algoritmu z počáteční násady — stejná násada dá vždy stejnou posloupnost, takže čísla jsou jen pseudonáhodná. Pravá náhodná čísla dávají hardwarové (fyzikální) metody: měří se nějaký fyzikální děj, například napěťové špičky v elektrické síti nebo náhodný pohyb myši uživatele.","kod":"7ZNA2/03","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-24"},{"q":"🗣️ 7ZNA2/03 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím, jaké programové prostředky máme pro tvorbu simulačních programů — od balíků podprogramů přes univerzální simulátory až po simulační jazyky a jejich klasifikaci (typy A, AT, T). Potom přejdu ke generování pseudonáhodných čísel: proč je potřebujeme, jak fungují kongruenční generátory, jaká je jejich perioda, jak se testují a jak z rovnoměrného rozdělení získáme jiná rozdělení. Nakonec popíšu modely hromadné obsluhy — vstupní tok, frontu a její řád, obslužné linky a výkonnostní charakteristiky — a celé to zarámuji Kendallovou klasifikací s příklady typu M/M/1.","kod":"7ZNA2/03","okruh":"7ZNA2","typ":"🗣️ Osnova","datum":"2026-07-24"},{"q":"Co je CityGML a k čemu slouží?","a":"CityGML je otevřený standard sémantického 3D modelu města — na rozdíl od pouhé vizuální geometrie (mesh) nese význam objektů: tohle je budova, střecha, okno, s atributy. Díky tomu lze nad modelem počítat analýzy — solární potenciál střech, energetickou náročnost, zastínění. Helsinki 3D+ udržuje oba modely: visual mesh pro prezentaci a CityGML pro výpočty.","kod":"7ZNA2/09","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-24"},{"q":"Jak byste programově načetl data z městského API?","a":"Pošlu HTTP GET požadavek na REST endpoint (často s API klíčem), server vrátí JSON; ten deserializuji knihovnou do objektů a zpracuji. U XML odpovědí zvolím DOM parser pro malé dokumenty, SAX pro velké. U streamovaných IoT dat se přihlásím k odběru přes MQTT (publish–subscribe). Musím ošetřit kódování (UTF-8), rate limity a validaci dat.","kod":"7ZNA2/09","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-24"},{"q":"Jak konkrétně pomáhá digitální dvojče energetice města?","a":"Umožňuje energetické modelování budov a plánování retrofittingu, výpočet solárního potenciálu střech (Singapur 640 MWp, Helsinki Energy \u0026 Climate Atlas), simulace dekarbonizace a tepelných ostrovů. V kombinaci se smart grid daty podporuje demand response — predikci špiček a řízení spotřeby podle dynamických cen, případně predikci výpadků v distribuční síti.","kod":"7ZNA2/09","okruh":"7ZNA2","typ":"🔍 Detail","datum":null},{"q":"Jaká jsou rizika open dat a jak jim čelit?","a":"Ochrana soukromí (možnost deanonymizace, data o spotřebě odhalují chování domácností), bezpečnost dat, špatná rozhodnutí kvůli nekvalitním datům, prohlubování mocenských asymetrií a open washing — formální otevřenost bez reálné hodnoty. Řešením je anonymizace a agregace, data governance, kontrola kvality a vyhodnocování dopadů iniciativ, například randomizovanými kontrolovanými studiemi.","kod":"7ZNA2/09","okruh":"7ZNA2","typ":"🔍 Detail","datum":null},{"q":"Jaké znáte konkrétní open data portály a co nabízejí?","a":"Pražské Golemio — datová platforma s veřejným API: real-time polohy vozidel MHD, senzory naplněnosti odpadových nádob, integrace Waze. NYC Open Data — tisíce datasetů města New York. Helsinki publikuje otevřený 3D model města pod licencí Creative Commons. Data se nabízejí typicky jako datasety (CSV/JSON/XML) a přes REST API.","kod":"7ZNA2/09","okruh":"7ZNA2","typ":"🔍 Detail","datum":null},{"q":"Jakou roli hraje LPWAN/LoRaWAN oproti 5G v městském IoT?","a":"LPWAN sítě jako LoRaWAN jsou určené pro senzory s bateriovým napájením na roky provozu — přenášejí malé objemy dat na velké vzdálenosti s minimální spotřebou (typicky čidla naplněnosti nádob, parkovací senzory). 5G naopak nabízí vysokou propustnost a nízkou latenci pro náročné aplikace — kamery, autonomní mobilitu, real-time řízení. Město typicky kombinuje obojí podle typu zařízení.","kod":"7ZNA2/09","okruh":"7ZNA2","typ":"🔍 Detail","datum":null},{"q":"Jaký je rozdíl mezi digitálním modelem, digitálním stínem a digitálním dvojčetem?","a":"Digitální model je statická reprezentace s manuálním tokem dat (CAD/mesh vizualizace). Digitální stín má jednosměrný automatický tok dat z reality do modelu — slouží k monitoringu v reálném čase. Digitální dvojče má obousměrný tok: umí simulovat a predikovat a výsledky se vracejí zpět jako zásahy do reálného systému.","kod":"7ZNA2/09","okruh":"7ZNA2","typ":"🔍 Detail","datum":null},{"q":"Proč se v IoT používá MQTT místo HTTP?","a":"MQTT je odlehčený publish–subscribe protokol navržený pro zařízení s omezenou energií a nespolehlivou sítí — má minimální režii zpráv, broker rozesílá data mnoha odběratelům a podporuje úrovně QoS. HTTP request–response je pro časté malé zprávy z tisíců senzorů zbytečně těžkopádné. Alternativou pro velmi omezená zařízení je CoAP nad UDP.","kod":"7ZNA2/09","okruh":"7ZNA2","typ":"🔍 Detail","datum":null},{"q":"🗣️ 7ZNA2/09 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím, co je chytré město a proč jsou jeho krví data — projdu tři stavební kameny: open data, API a IoT. Pak popíšu, jak se taková data strojově čtou (formáty JSON/XML/CSV, REST API, parsování). Na to navážu využitím dat pro urban data analytics, počítačové modely a digitální dvojčata včetně konkrétních příkladů (Virtual Singapore, Helsinki, Praha, Plzeň). Nakonec shrnu hlavní výzvy integrace — interoperabilitu, kybernetickou bezpečnost, soukromí a financování — a možnosti, které integrace přináší.","kod":"7ZNA2/09","okruh":"7ZNA2","typ":"🗣️ Osnova","datum":null},{"q":"Co je sociální zahálení a jak se mu dá bránit?","a":"Tendence jednotlivce snižovat úsilí, když se hodnotí jen společný výstup týmu a jeho osobní přínos není dohledatelný — „veze se\" na práci ostatních. Podle experimentálních studií pomáhá budování společné identity týmu, možnost vzájemného postihu a hlavně osobní dohledatelnost (accountability) příspěvku každého člena, například jasným přidělením úkolů a reportováním.","kod":"7ZNA2/10","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Co je synergický efekt a kdy nastává?","a":"Synergický efekt znamená, že potenciál skupiny převyšuje prostý součet potenciálů jednotlivců. Vzniká vzájemným eliminováním nedostatků členů, jejich inspirací a tvořivým propojením jejich schopností. Nastává až ve správně řízeném a sladěném týmu — po překonání počáteční fáze, kdy si tým hledá pravidla a role a výkon dočasně klesá.","kod":"7ZNA2/10","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Co je trojimperativ projektu?","a":"Trojimperativ jsou tři provázané veličiny vymezující projekt: rozsah (kvalita), čas a náklady. Nelze měnit jednu bez dopadu na ostatní — když například zkrátíme termín, musíme buď zmenšit rozsah, nebo zvýšit náklady. Úkolem projektového manažera je udržet všechny tři v rovnováze vůči cíli projektu.","kod":"7ZNA2/10","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Čím se liší projektový tým od liniové pracovní skupiny?","a":"Projektový tým je dočasný — vzniká pro jeden cíl a po jeho dosažení se rozpouští; úkoly jsou unikátní, vázané na konkrétní schopnosti členů a vzájemně závislé, takže výpadek jednoho člena může paralyzovat celek. Pracovní skupina je stálá, úkoly lze předat komukoli s odpovídající kvalifikací, členové pracují samostatně a konflikty vznikají méně často. Liší se i komunikace: v týmu musí být o všem informováni všichni.","kod":"7ZNA2/10","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Jaké nástroje podporují týmovou spolupráci v softwarovém projektu?","a":"Plánovací software (Microsoft Project) s Ganttovým diagramem a plánem vytížení zdrojů, e-mail s kalendářem pro organizaci schůzek a zadávání úkolů, a sdílení dokumentů — sdílené složky nebo SharePoint s verzováním a řízením přístupových práv. Jejich smyslem je stejná informovanost všech členů; dnes bychom doplnili Git, systémy pro řízení úkolů typu Jira a chatovací platformy.","kod":"7ZNA2/10","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Jaké procesní skupiny (fáze) definuje PMBOK?","a":"Pět skupin: inicializační procesy (definice projektu nebo etapy), plánovací (cíle, rozsah, aktivity), výkonné (integrace lidí a zdrojů pro realizaci), monitorovací a kontrolní (měření vývoje, identifikace odchylek od plánu) a uzavírací (formální přijetí výsledků a předání produktu). Platí pro celý projekt i jednotlivé fáze.","kod":"7ZNA2/10","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Jaké týmové role definuje Belbinova typologie a proč je důležité je pokrýt?","a":"Belbin popisuje devět rolí: myslitel (pěstitel nápadů), vyhledavač zdrojů, kontrolor/vyhodnocovač, realizátor, dotahovač, týmový hráč, formovač, koordinátor a specialista. Každá role přináší jiný typ chování a přístupu k řešení problémů; pokud některá chybí nebo se zbytečně duplikuje, tým ztrácí výkon. Jeden člověk může zastávat více rolí podle situace.","kod":"7ZNA2/10","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Jakých pět příčin selhávání týmů popisuje Lencioni?","a":"Pyramida od základny: absence důvěry, obavy z konfliktu (chybí otevřená komunikace), nedostatek loajality či zaujetí pro společné cíle, vyhýbání se zodpovědnosti a lhostejnost k výsledkům. Každé patro staví na předchozím — bez důvěry se lidé bojí konfliktu, bez konfliktu nevznikne skutečná shoda, a tak dále. Manažer proto musí nejdřív budovat důvěru.","kod":"7ZNA2/10","okruh":"7ZNA2","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"🗣️ 7ZNA2/10 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím, co je tým a proč je týmová spolupráce v informatice tak důležitá — synergický efekt, týmové role, komunikace a sdílení znalostí. Potom přejdu k projektovému řízení: definice projektu, trojimperativ, fáze projektu, plánování a řízení rizik. Ve třetí části porovnám týmový a individuální přístup k práci včetně sociálních jevů, jako je sociální zahálení. Na závěr ukážu, jak oba koncepty dohromady vedou k efektivnímu vývoji a implementaci softwaru v moderním prostředí — agilní a samořídící týmy, dělba práce podle rolí a moderní nástroje pro spolupráci.","kod":"7ZNA2/10","okruh":"7ZNA2","typ":"🗣️ Osnova","datum":"2026-07-25"},{"q":"Co je RfC a jak vypadá jeho životní cyklus?","a":"Request for Change — popsaný návrh změny jednoho či více artefaktů (důvodem je oprava chyby, zlepšení kvality nebo nový požadavek). Životní cyklus: nový → zaevidovaný → schválený → přiřazený → zpracovávaný → hotový; při změnách stavu se doplňuje dopad na návrh/architekturu a odhad ceny. O schválení rozhoduje Change Control Board (CCB).","kod":"7ZNAS/01","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Čím je RUP řízen?","a":"Třemi klíčovými aspekty: je risk driven (řízení rizik je součástí procesu, nejrizikovější věci se řeší nejdříve), use-case driven (use casy vyjadřují požadavky i hodnotu pro zákazníka a jsou podkladem vývoje, plánování i testování) a architecture-centric (architektura je základním kamenem systému, skládá se z více koordinovaných pohledů).","kod":"7ZNAS/01","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Jaké druhy testování RUP rozlišuje a kdo za kvalitu odpovídá?","a":"Unitové (nejmenší jednotky, v rámci implementace), integrační (spolupráce komponent při use casu), systémové (funkčnost aplikace) a akceptační (uživatelé před nasazením); průřezově regresní testování. Za kvalitu odpovídá celý tým od začátku vývoje — cílem testerů není kvalitu zajistit, ale ohodnotit ji a poskytovat zpětnou vazbu.","kod":"7ZNAS/01","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Jaký je rozdíl mezi analýzou a návrhem?","a":"Analýza se soustředí na pochopení funkčních požadavků a vytváří ideální obraz systému (třídy, subsystémy) bez vazby na technologii — opomíjí nefunkční požadavky a implementační omezení. Návrh mapuje výsledky analýzy na implementační prostředí a nefunkční požadavky (vrstvy, DB, knihovny); cílem je optimální systém pokrývající všechny požadavky.","kod":"7ZNAS/01","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Jaký je rozdíl mezi fází a disciplínou?","a":"Fáze je časový úsek projektu ukončený milníkem (Inception, Elaboration, Construction, Transition). Disciplína je seskupení aktivit jedné oblasti zájmu (požadavky, testování…), které se vykonávají v každé iteraci každé fáze — mění se jen jejich objem, což ukazuje „hrbatý\" graf RUP. Disciplína tedy není fáze vodopádu.","kod":"7ZNAS/01","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Jaký je rozdíl mezi RUP a OpenUP, případně RUP a agilními metodikami?","a":"RUP je maximalistický a komerční — obsahuje co nejširší pokrytí procesu (spousta artefaktů a aktivit), vyžaduje výbornou znalost frameworku. OpenUP (součást EPF) je minimalistický a zdarma — jen jádro RUP plus agilní techniky z XP, Scrumu a Lean; startovní bod pro menší týmy. RUP je ve své podstatě také agilní (iterace, řízení riziky, průběžné testování), ale připouští více formálnosti a procedur.","kod":"7ZNAS/01","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Jakými milníky končí jednotlivé fáze RUP?","a":"Inception končí milníkem Lifecycle Objectives (shoda na rozsahu a cílech), Elaboration milníkem Lifecycle Architecture (ověřená architektura, zvládnutá hlavní rizika), Construction milníkem Initial Operational Capability (systém schopný provozu, beta) a Transition milníkem Product Release (produkt předán zákazníkovi).","kod":"7ZNAS/01","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"Které UML diagramy použijete ve kterých disciplínách?","a":"Byznys modelování: business use case diagram, diagram aktivit pro procesy. Požadavky: use case diagram se scénáři. Analýza a návrh: třídní diagramy, sekvenční diagramy pro realizaci use casů, diagramy aktivit, komponent a nasazení. Model nasazení se využívá i v disciplíně Deployment.","kod":"7ZNAS/01","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-25"},{"q":"🗣️ 7ZNAS/01 — Řekni osnovu odpovědi","a":"Nejprve představím RUP jako procesní framework — jeho principy, iterativně-inkrementální vývoj a čtyři fáze (Inception, Elaboration, Construction, Transition) a vysvětlím vztah fází a disciplín. Poté projdu postupně všech šest hlavních disciplín (byznys modelování, požadavky, analýza a návrh, implementace, testování, nasazení) a tři podpůrné (správa konfigurací a změn, projektové řízení, prostředí). U každé disciplíny uvedu její cíl, používané formalismy a techniky (UML diagramy, artefakty) a konkrétní příklad.","kod":"7ZNAS/01","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-25"},{"q":"Co znamená MoSCoW a k čemu slouží?","a":"Je to technika prioritizace požadavků z DSDM: MUST (nezbytné požadavky); SHOULD (doporučené, neohrožují životaschopnost projektu); COULD (absence nemá dopad); WONT (dodělat kdykoliv později). Umožňuje dodržet pevný termín tím, že se při nedostatku času škrtá odspodu - rozsah je plovoucí, čas a kvalita fixní.","kod":"7ZNAS/02","okruh":"7ZNAS","typ":"🔍 Detail","datum":null},{"q":"Čím se liší Crystal Clear od ostatních zmíněných metodik?","a":"Crystal Clear (Cockburn) není metodika, ale návod, jak si metodiku vytvořit na míru projektu. Zaměřuje se na lidi, ne na procesy a technologie - malý tým 2-7 vývojářů s architektem, společná místnost, přístup k expertním uživatelům a pravidelné doručování. Definuje 7 vlastností, z nichž povinné jsou frequent delivery, reflective improvement a osmotic communication.","kod":"7ZNAS/02","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-26"},{"q":"Jaké dva typy iterací má AUP a proč?","a":"Development release - interní vydání na konci každé iterace, slouží pro rychlou zpětnou vazbu a ověření; a production release - vydání nasazené do produkce zákazníkovi. AUP tak odděluje častý interní rytmus vývoje od méně častých, stabilních produkčních nasazení.","kod":"7ZNAS/02","okruh":"7ZNAS","typ":"🔍 Detail","datum":null},{"q":"Jaké jsou tři otázky na Daily Scrumu a jak dlouho trvá?","a":"Co jste udělali od minula, co uděláte do příště a je něco, co vás zpomaluje nebo vám stojí v cestě? Je to krátký (typicky 15minutový) synchronizační stand-up celého týmu, každých 24 hodin během sprintu; neřeší se na něm detaily, ty se berou stranou.","kod":"7ZNAS/02","okruh":"7ZNAS","typ":"🔍 Detail","datum":null},{"q":"Jaký je rozdíl mezi incidentem a problémem v ITIL?","a":"Incident je jakákoli událost, která způsobí (nebo může způsobit) přerušení či snížení kvality služby - řeší se rychle, klidně workaroundem. Problém je neznámá kořenová příčina jednoho nebo více incidentů; jakmile příčinu známe, stává se z něj known error a řeší se změnou (RfC). Incident management hasí, problem management hledá příčiny.","kod":"7ZNAS/02","okruh":"7ZNAS","typ":"🔍 Detail","datum":null},{"q":"Jaký je rozdíl mezi Product Backlogem a Sprint Backlogem?","a":"Product backlog je prioritizovaný seznam všech požadavků na produkt (user stories s odhady komplexnosti), který spravuje Product Owner a který se neustále mění. Sprint backlog je podmnožina vybraná na Sprint Planningu pro aktuální sprint, rozpadnutá týmem na konkrétní tasky. Za product backlog odpovídá PO, za sprint backlog tým.","kod":"7ZNAS/02","okruh":"7ZNAS","typ":"🔍 Detail","datum":null},{"q":"Je ITIL standard nebo metodika? Co nepokrývá?","a":"Ani jedno - ITIL je framewo
