rk, knihovna best practices, která říká CO a KDY dělat při provozu IT služeb, ale ne JAK. Standardem je např. ISO 20000. ITIL nepokrývá organizační strukturu a přidělení rolí ani strukturu podnikových procesů a nelze jím řídit implementaci ITSM (doporučuje se PRINCE2).","kod":"7ZNAS/02","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-26"},{"q":"Proč se Scrum často kombinuje právě s XP?","a":"Scrum je framework projektového řízení a záměrně neobsahuje žádné inženýrské praktiky - neříká, jak psát kód. XP je naopak zaměřené na techniky vývoje (TDD, párové programování, CI, refaktoring), ale neřeší řízení projektu. Vzájemně se tedy doplňují: Scrum dává rytmus a role, XP kvalitu kódu.","kod":"7ZNAS/02","okruh":"7ZNAS","typ":"🔍 Detail","datum":null},{"q":"🗣️ 7ZNAS/02 — Řekni osnovu odpovědi","a":"Nejprve krátce ukotvím agilní přístupy v Agile manifestu a pak postupně projdu pět metodik: Scrum (role, artefakty, události), Extrémní programování (hodnoty a praktiky), Feature-Driven Development, Agile Unified Process a DSDM. Poté ukážu, jak se tyto postupy v praxi kombinují do vlastní metodiky a jak s tím souvisí Crystal Clear jako návod na tvorbu metodiky na míru. Nakonec vysvětlím ITIL jako vybranou metodu pro správu IT služeb.","kod":"7ZNAS/02","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-26"},{"q":"Co dnes nahrazuje .NET Framework a WCF?","a":"Multiplatformní .NET Core, který se od verze .NET 5 sjednotil do jedné platformy .NET (Unified platform) — běží na Windows, Linuxu i macOS. Místo WCF se pro služby používá ASP.NET Core Web API (REST) nebo gRPC; místo Compact/Micro Frameworku miniaturizované varianty .NET a .NET nanoFramework.","kod":"7ZNAS/03","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-26"},{"q":"Čím se liší AJAX od WebSocketů?","a":"AJAX je vždy požadavek–odpověď iniciovaná klientem nad HTTP. WebSocket otevře trvalé obousměrné spojení, takže server může data posílat sám od sebe (chat, notifikace, burzovní data). AJAX se hodí na občasné dotazy, WebSocket na průběžnou komunikaci v reálném čase.","kod":"7ZNAS/03","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-26"},{"q":"Jak .NET dosahuje jazykové nezávislosti?","a":"Přes Common Language Specification: všechny podporované jazyky (C#, VB.NET, F#) se kompilují do společného mezijazyka MSIL/CIL. Ten za běhu vykonává CLR pomocí JIT kompilace do nativního kódu. Díky společnému typovému systému může třída napsaná v C# dědit z třídy ve VB.NET.","kod":"7ZNAS/03","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-26"},{"q":"Jak vypadá životní cyklus servletu?","a":"Servletový kontejner servlet jednou instancuje a zavolá init(), pak pro každý požadavek volá service() — u HttpServletu se to mapuje na doGet()/doPost() — a při ukončení zavolá destroy(). Jedna instance obsluhuje mnoho požadavků paralelně, proto musí být bezstavová nebo vláknově bezpečná.","kod":"7ZNAS/03","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-26"},{"q":"Jaké typy EJB existují a kdy který použít?","a":"Session beany pro business logiku — stateless pro běžné operace, stateful pro stav konverzace (košík). Message-driven beany pro asynchronní zpracování zpráv z JMS fronty. Entity beany reprezentovaly data, dnes je nahrazuje JPA s ORM mapováním na tabulky.","kod":"7ZNAS/03","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-26"},{"q":"Jaký je rozdíl mezi JDBC a JPA?","a":"JDBC je nízkoúrovňové rozhraní — sám píšu SQL a ručně mapuji výsledky na objekty. JPA je ORM standard nad JDBC: entity mapuji anotacemi na tabulky a framework (Hibernate) SQL generuje sám. JPA zrychluje vývoj, JDBC dává plnou kontrolu nad SQL a výkonem.","kod":"7ZNAS/03","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-26"},{"q":"Jaký je rozdíl mezi JVM, JRE a JDK?","a":"JVM je virtuální stroj, který vykonává bytecode. JRE je běhové prostředí — JVM plus standardní knihovny, stačí ke spuštění aplikace. JDK je vývojářská sada — JRE plus kompilátor javac a nástroje pro vývoj. Od Javy 11 se distribuuje prakticky jen JDK.","kod":"7ZNAS/03","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-26"},{"q":"Jaký je rozdíl mezi UDDI, WSDL a SOAP?","a":"Tři vrstvy práce s webovou službou: v UDDI rejstříku službu najdu, z WSDL popisu zjistím, co umí a jak ji volat (vývojové prostředí z něj vygeneruje proxy-objekt), a SOAP je protokol, kterým s ní pak reálně mluvím — XML obálka Envelope s hlavičkou Header a tělem Body.","kod":"7ZNAS/03","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-26"},{"q":"Kdy zvolit SOAP a kdy REST?","a":"SOAP tam, kde potřebuji formální kontrakt (WSDL), standardy pro bezpečnost a spolehlivé doručení — integrace bank, státní správa, starší podnikové systémy. REST pro běžné API — je jednodušší, používá přímo HTTP metody a JSON, snadno se konzumuje z JavaScriptu a mobilních aplikací.","kod":"7ZNAS/03","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-26"},{"q":"🗣️ 7ZNAS/03 — Řekni osnovu odpovědi","a":"Nejprve projdu čtyři edice Javy od nejmenší (JavaCard) po největší (Java EE) a u každé řeknu, k čemu se používá; u Java EE se zastavím u webových technologií Servlet, JSP, JDBC a EJB. Pak přejdu na svět Microsoftu — tři platformy .NET a hlavní součásti .NET Frameworku, tedy ASP.NET, LINQ a WCF. Nakonec oba světy propojím: vysvětlím myšlenku webových služeb (SOAP a REST) a jejich implementaci v Javě i .NET, a zakončím principem technologie AJAX s jednoduchým příkladem.","kod":"7ZNAS/03","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-26"},{"q":"Co je to ETL a jak souvisí s pojmem datová pumpa?","a":"ETL (Extract-Transform-Load) je proces, který data z provozních (OLTP) databází extrahuje, transformuje (homogenizuje, odstraňuje sémantické rozdíly) a nahrává do datového skladu. V materiálech je tento nástroj označován jako datová pumpa, protože pravidelně čerpá data ze zdrojových databází do skladu.","kod":"7ZNAS/04","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Co znamenají granularita a aditivita faktů?","a":"Granularita udává úroveň podrobnosti uložených faktů — čím vyšší granularita, tím detailnější (méně agregovaná) data. Aditivita popisuje, zda lze fakt sčítat/sumarizovat podle všech dimenzí (aditivní), jen podle některých (semiaditivní), nebo vůbec ne (neaditivní).","kod":"7ZNAS/04","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Jaké typy NoSQL databází znáš a kdy bys je použil místo relační databáze?","a":"Klíč-hodnota, dokumentové, sloupcové, grafové a vícemodelové. Použijí se tam, kde je potřeba vysoká rychlost zpracování v reálném čase, proměnlivá/neznámá struktura dat nebo horizontální škálování na více uzlů — typicky právě u Big Data zátěže, kde relační schéma a transakční garance nejsou nutné nebo jsou příliš nákladné.","kod":"7ZNAS/04","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Jaký je hlavní rozdíl mezi OLTP a OLAP?","a":"OLTP obsluhuje běžný provoz — krátké, jednoduché transakce nad aktuálními daty pro mnoho současně přistupujících uživatelů. OLAP slouží analytikům pro podporu rozhodování — komplexní dotazy nad historickými, sumarizovanými a multidimenzionálními daty, obvykle nad datovým skladem.","kod":"7ZNAS/04","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Jaký je rozdíl mezi schématem hvězda a vločka?","a":"Schéma hvězda má jednu tabulku faktů přímo propojenou s denormalizovanými tabulkami dimenzí. Schéma vločka vychází ze stejného principu, ale dimenze jsou dále rozloženy (normalizovány) do podřízených tabulek, čímž se snižuje redundance za cenu složitější struktury.","kod":"7ZNAS/04","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"K čemu slouží OLAP operace jako drill-down, roll-up a slice-and-dice?","a":"Jde o způsoby navigace v datové kostce: drill-down jde po hierarchii dolů k větší podrobnosti; roll-up naopak agreguje na vyšší úroveň; slice-and-dice umožňuje vybrat/rozdělit podmnožinu dat; drill-across spojuje faktové tabulky se stejnou granularitou; pivot mění, které dimenze jsou v aktuálním pohledu zobrazeny.","kod":"7ZNAS/04","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Proč se pro analytické dotazy nad datovým skladem nepoužívá jen čisté SQL?","a":"Protože SQL jako množinový/relační jazyk není vždy efektivní pro typicky analytické operace — např. nalezení jediného nejlepšího záznamu podle kritérií by vyžadovalo provést nákladné množinové operace nad velkým objemem dat a teprve nakonec vybrat a seřadit výsledek. Proto se používají rozšíření SQL nebo specializované OLAP nástroje.","kod":"7ZNAS/04","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Vysvětli model 3V/4V u Big Data.","a":"Volume (objem), Velocity (rychlost vzniku a nutnost zpracování) a Variety (různorodost strukturovaných i nestrukturovaných dat) tvoří klasický model 3V. Někteří autoři doplňují čtvrté V — Veracity, tedy věrohodnost a konzistenci dat, typicky u dat ze sociálních sítí.","kod":"7ZNAS/04","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"🗣️ 7ZNAS/04 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím, co jsou Big Data, k čemu slouží a jaké mají charakteristiky. Poté probereme datové sklady — jejich vztah k provozním OLTP systémům, proces ETL a dimenzionální modelování. Následně shrnu hlavní výzvy při analýze Big Dat a na závěr popíšu nástroje a technologie, které se v této oblasti obvykle používají, včetně NoSQL databází.","kod":"7ZNAS/04","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-27"},{"q":"Co je BSON a proč ho MongoDB používá místo klasického JSON?","a":"BSON je binární forma JSON, která je 2 až 5× rychlejší na zpracování než textový JSON, protože se data před přenosem převedou do binární podoby. MongoDB ho používá interně pro ukládání a přenos dokumentů kvůli výkonu a kompaktnosti.","kod":"7ZNAS/05","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Co je to homogenizace dat při integraci heterogenních zdrojů a proč je potřeba?","a":"Homogenizace je proces odstranění sémantických a formátových rozdílů mezi daty z různých zdrojových systémů, např. jiné názvy stejného atributu nebo jiné jednotky. Bez ní by data z různých zdrojů nešlo v datovém skladu smysluplně spojit a analyzovat společně.","kod":"7ZNAS/05","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Co znamená, že sekundární uzly replikují oplog primárního uzlu?","a":"Primární uzel zapisuje každou změnu dat do svého operačního protokolu (oplog). Sekundární uzly tento protokol průběžně čtou a stejné operace aplikují na svá vlastní data, takže jejich datová sada postupně odráží stav primárního uzlu.","kod":"7ZNAS/05","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Jak funguje vyhledávání podle obsahu u obrazových dat, když se nedá hledat přesnou shodou?","a":"Obsah obrázku se převede na vektor příznaků popisujících například barvu, tvar nebo texturu. Vyhledávání pak probíhá jako hledání nejpodobnějších vektorů v tomto prostoru příznaků, výsledkem je seřazený seznam podle míry podobnosti, ne přesná shoda.","kod":"7ZNAS/05","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Jaký je rozdíl mezi embedded a referenčním řešením vztahů v MongoDB?","a":"Embedded řešení vloží související data přímo dovnitř nadřazeného dokumentu jako vnořenou strukturu, takže se vše načte jedním dotazem. Referenční řešení uloží jen ID souvisejícího dokumentu v jiné kolekci, podobně jako cizí klíč, což šetří místo při opakovaných datech, ale vyžaduje další dotaz pro dohledání souvisejících záznamů.","kod":"7ZNAS/05","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Proč musí mít sada replik lichý počet hlasujících uzlů?","a":"Pokud primární uzel vypadne, sekundární uzly mezi sebou hlasují, který z nich se stane novým primárním. Lichý počet hlasujících zabraňuje situaci nerozhodné remízy při tomto hlasování.","kod":"7ZNAS/05","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Proč se u NoSQL databází mluví o tom, že preferují dostupnost před konzistencí?","a":"NoSQL databáze jsou obvykle koncipované jako distribuované systémy, kde se transakční zpracování typicky neřeší striktně jako v relačních databázích. Cílem je, aby byla data vždy dostupná i za cenu toho, že mohou být v daný okamžik jen částečně konzistentní mezi jednotlivými uzly.","kod":"7ZNAS/05","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"Uveď příklad databáze pro každou kategorii NoSQL.","a":"Klíč-hodnota - Redis. Dokumentové - MongoDB. Sloupcové - Cassandra nebo HBase. Grafové - Neo4j.","kod":"7ZNAS/05","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-27"},{"q":"🗣️ 7ZNAS/05 — Řekni osnovu odpovědi","a":"Nejdřív popíšu, čím jsou specifické obrazové a multimediální databáze — jak se v nich ukládají data, jaká metadata se k nim vedou a jak se v nich vyhledává podle obsahu. Pak vysvětlím, jak se integrují heterogenní data z různých zdrojů do jednotného úložiště. Dál přejdu k dokumentově orientovaným databázím na příkladu MongoDB včetně replikace. Nakonec zařadím dokumentové databáze do širší kategorie NoSQL a shrnu, čím se NoSQL databáze principiálně liší od tradičních relačních databází.","kod":"7ZNAS/05","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-27"},{"q":"Co dělá metoda addObserver a kdy se typicky volá?","a":"addObserver(Observer o) přidá daný objekt do interního seznamu pozorovatelů uvnitř Observable objektu. Typicky se volá při inicializaci — v konstruktoru sledovaného objektu nebo hned po jeho vytvoření, ještě předtím, než dojde k první změně stavu.","kod":"7ZNAS/06","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"Co se stane, pokud v Javě zapomenu zavolat setChanged() před notifyObservers()?","a":"notifyObservers() v takovém případě neudělá nic — Observable interně kontroluje příznak změny a pokud není nastavený, žádný pozorovatel se nezavolá. Je to ochrana proti zbytečným notifikacím, když se stav fakticky nezměnil.","kod":"7ZNAS/06","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"Jak souvisí MVC s Observerem — je to stejný vzor?","a":"MVC je architektonický vzor, který řeší rozdělení odpovědností v interaktivní aplikaci; mechanismus šíření změn uvnitř MVC je ale principiálně realizován pomocí vzoru Observer (nebo jeho alias Publisher-Subscriber). V javovských knihovnách se ostatně tato podpora přímo jmenuje Observer/Observable.","kod":"7ZNAS/06","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"Jaké jsou nevýhody (slabá místa) vzoru MVC?","a":"Rostoucí složitost systému, rychle rostoucí počet operací update při větším množství pohledů, potenciální neefektivnost přístupu k datům z pohledu (opakované dotazy na model), nutnost měnit view a controller při portování na jinou platformu a problémy při kombinaci s moderními nástroji tvorby uživatelského rozhraní.","kod":"7ZNAS/06","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"Jaký je rozdíl mezi vztahem view-controller a view-model?","a":"Vztah view-controller je typicky jedna k jedné a pevně daný při inicializaci (view si vytváří svůj controller). Vztah view-model je one-to-many z pohledu modelu — jeden model může mít mnoho views zaregistrovaných jako pozorovatelé, ale každý view zná jen ten jeden model, na který je navázán.","kod":"7ZNAS/06","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"Proč model při notifikaci neposílá rovnou celá data, ale jen oznámení o změně?","a":"Aby model nemusel znát strukturu ani počet konkrétních pohledů — stačí obecné rozhraní Observer. Každý pohled si sám vyžádá jen ta data, která potřebuje, a v podobě, v jaké je chce zobrazit, což udržuje model nezávislý na UI.","kod":"7ZNAS/06","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"Proč se ve webové variantě mluví o „Model 2\" a ne prostě o MVC?","a":"Model 1 byl starší přístup, kde JSP stránka sama obsahovala jak logiku, tak zobrazení. Model 2 je označení pro variantu, kde se role rozdělí podle MVC — servlet jako controller, JSP jako view, JavaBean jako model — proto se pro odlišení od Modelu 1 používá název Model 2, i když jde principiálně o totéž MVC.","kod":"7ZNAS/06","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"🗣️ 7ZNAS/06 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím problém, který MVC řeší, a rozdělení odpovědností mezi Model, View a Controller. Pak popíšu mechanismus šíření změn, tedy jak se model, view a controller domlouvají přes vzor Observer. Dále ukážu, jak je tento princip v Javě přímo podpořen třídou Observable a rozhraním Observer. Nakonec vysvětlím, jak se MVC aplikuje ve webovém prostředí, konkrétně na modelu Model 2 se servletem a JSP.","kod":"7ZNAS/06","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-28"},{"q":"Co se stane, když u Abstraktní továrny smícháte produkty z různých konkrétních továren?","a":"Poruší se konzistence rodiny produktů (např. 2D tvar by komunikoval s 3D tvarem), což je přesně to, čemu má vzor zabránit — proto klient dostává jen jednu konkrétní továrnu a z ní čerpá všechny produkty najednou.","kod":"7ZNAS/07","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"Jak by šlo Jednoduchou továrnu rozšířit bez úpravy existujícího kódu?","a":"Nešlo by to čistě — přidání nového typu produktu vždy vyžaduje zásah do těla podmínkového bloku metody vytvorit(). To je hlavní motivace pro přechod na Tovární metodu, kde se místo úpravy podmínky přidá nová podtřída továrny.","kod":"7ZNAS/07","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"Jaký je rozdíl mezi Abstraktní továrnou a Tovární metodou z pohledu počtu vytvářených typů produktů?","a":"Tovární metoda pracuje typicky s jedním typem produktu (jedna tovární metoda), zatímco Abstraktní továrna pracuje s celou rodinou vzájemně souvisejících produktů (více tovární metod v jednom rozhraní továrny).","kod":"7ZNAS/07","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"Jaký je vztah Tovární metody k principu otevřenosti/uzavřenosti?","a":"Přidání nového typu produktu s vlastní konkrétní továrnou nevyžaduje zásah do existujícího kódu jiných továren ani klienta — stačí přidat novou podtřídu, čímž je systém otevřený pro rozšíření a uzavřený pro modifikaci.","kod":"7ZNAS/07","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"Kde v kódu se typicky pozná, že jde o tovární metodu, a ne o obyčejnou metodu vracející objekt?","a":"Tovární metoda jednak vytváří nový objekt, jednak izoluje klienta od informace, od které konkrétní třídy byl objekt vytvořen — definitivní třída závisí na chování konkrétní podtřídy továrny, ne na parametru, který klient přímo zadává.","kod":"7ZNAS/07","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"Proč jednoduchá továrna formálně nepatří mezi klasické GoF vzory?","a":"Protože jde jen o vyčlenění podmínkové logiky vytváření do jedné třídy, bez využití polymorfismu na straně továrny samotné — chybí hierarchie továren. Je to spíše idiom/technika, ze které se Tovární metoda a Abstraktní továrna teprve zobecňují.","kod":"7ZNAS/07","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"Proč se v příkladu používá princip \"programování proti rozhraní\"?","a":"Protože zajišťuje, že proměnná na levé straně přiřazení je typu rozhraní (např. Tvar), takže může díky polymorfismu ukazovat na libovolnou instanci implementující dané rozhraní — klient se tak nemusí měnit, i když se za new na pravé straně objeví jiná konkrétní třída.","kod":"7ZNAS/07","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-28"},{"q":"🗣️ 7ZNAS/07 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím obecný problém, který všechny tři vzory řeší — oddělení vytváření objektů od jejich použití. Pak postupně projdu tři úrovně řešení od nejjednodušší po nejobecnější: Jednoduchou továrnu, Tovární metodu a Abstraktní továrnu, u každé ukážu strukturu a rozdíl oproti předchozí. Nakonec shrnu odlišnosti a uvedu praktické uplatnění.","kod":"7ZNAS/07","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-28"},{"q":"Co je ABA problém u lock-free datových struktur?","a":"Nastane, když vlákno přečte hodnotu A, mezitím ji jiné vlákno změní na B a zpět na A, a první vlákno pomocí CAS usoudí, že se nic nezměnilo, ačkoliv se struktura mezitím mohla změnit (např. u lock-free zásobníku přes uvolnění a znovu-přidání uzlu). Řeší se např. verzovanými ukazateli nebo schématy pro odloženou dealokaci paměti.","kod":"7ZNAS/08","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Co je atomická operace a k čemu slouží Compare-And-Set (CAS)?","a":"Atomická operace proběhne jako jediný nedělitelný krok, který nelze žádným jiným vláknem \"přerušit\" uprostřed. CAS porovná hodnotu v paměti s očekávanou hodnotou a jen pokud souhlasí, atomicky zapíše novou hodnotu - je to základní stavební prvek pro implementaci zámků i pro lock-free datové struktury (např. AtomicInteger v Javě).","kod":"7ZNAS/08","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Co je false sharing a jak se mu dá předejít?","a":"Situace, kdy dvě na sobě nezávislé proměnné použité různými vlákny leží ve stejné cache-line - zápis jednoho vlákna pak zneplatní cache i druhému vláknu, ačkoli spolu jejich proměnné vůbec nesouvisí. Řeší se zarovnáním/oddělením proměnných do různých cache-lines (v Javě např. anotací @Contended).","kod":"7ZNAS/08","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Co je lock-free programování a proč se používá místo zámků?","a":"Je to přístup k thread-safe sdílení dat bez použití zámků, typicky postavený na atomických operacích jako CAS. Řeší některé problémy zamykání (uváznutí, konvojování, citlivost na to, že vlákno je uspané se zámkem) za cenu složitější implementace; negarantuje ale automaticky vyšší výkon.","kod":"7ZNAS/08","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Co je RCU (Read-Copy-Update) a kdy se hodí?","a":"Technika, kde čtenáři přistupují k datům bez jakékoli synchronizace (extrémně rychlé čtení) a zapisovatel vytvoří novou kopii dat, kterou atomicky \"publikuje\", zatímco uvolnění staré verze odloží, dokud ji nepřestanou používat i poslední čtenáři. Hodí se pro data, která se čtou velmi často a mění jen zřídka.","kod":"7ZNAS/08","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Co je ThreadLocal a k čemu se používá?","a":"Mechanismus, který drží pod stejným jménem proměnné jinou hodnotu pro každé vlákno zvlášť - typicky pro thread-specifické ID nebo nezávislý generátor náhodných čísel pro každé vlákno, bez nutnosti synchronizace.","kod":"7ZNAS/08","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Jaké jsou nutné podmínky pro vznik uváznutí (deadlocku)?","a":"Klasicky se uvádí čtyři podmínky, které musí platit současně: vzájemné vyloučení (zdroj drží jen jedno vlákno); drž a čekej (vlákno drží zdroj a zároveň čeká na další); žádné vyvlastnění (zdroj nelze vláknu násilím odebrat); cyklické čekání (uzavřený řetězec vláken čekajících na sebe navzájem).","kod":"7ZNAS/08","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Jaký je rozdíl mezi mutexem a spinlockem a kdy použít který?","a":"Mutex uspí čekající vlákno (nevyužívá CPU, ale stojí přepnutí kontextu), spinlock aktivně čeká v cyklu (nevyžaduje přepnutí kontextu, ale plýtvá CPU časem). Spinlock se vyplatí jen u velmi krátkých kritických sekcí na víceprocesorovém stroji, jinak je lepší mutex.","kod":"7ZNAS/08","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"🗣️ 7ZNAS/08 — Řekni osnovu odpovědi","a":"Nejdřív popíšu hlavní problémy, se kterými se potýká vývojář vícevláknových aplikací - souběh, uváznutí, viditelnost změn v paměti a škálovatelnost. Pak ukážu, jak se vlákno v praxi vytváří, spouští a ukončuje, na příkladu POSIX vláken a Javy. Nakonec projdu základní nástroje pro synchronizaci a řízení běhu - kritickou sekci a mutex, monitor s synchronized/wait/notify, join a plánování vláken.","kod":"7ZNAS/08","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-29"},{"q":"Co je to ABA problém a jak se řeší?","a":"Vlákno přečte hodnotu A, mezitím ji jiné vlákno změní na B a zase zpátky na A - CAS pak uspěje, i když se s daty mezitím manipulovalo, což může poškodit datovou strukturu (typicky u lock-free zásobníku). Řeší se například přidáním verzovacího čítače, který se mění při každé úpravě, takže CAS porovnává i verzi, ne jen hodnotu.","kod":"7ZNAS/09","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Co je to deadlock a jak se dá detekovat nebo mu předejít?","a":"Deadlock je stav, kdy na sebe vlákna čekají v kruhu - každé drží zdroj, který potřebuje jiné vlákno v cyklu, a žádné nemůže pokračovat. Detekuje se například analýzou grafu čekání (wait-for graph) a hledáním cyklu v něm, nebo pomocí thread dumpů za běhu; předchází se mu typicky vynuceným jednotným pořadím zamykání zámků napříč celou aplikací.","kod":"7ZNAS/09","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Co je to priority inversion a jak souvisí se zámky?","a":"Nastává, když nízkoprioritní vlákno drží zámek, který potřebuje vysokoprioritní vlákno - vysokoprioritní vlákno tak fakticky čeká na nízkoprioritní, čímž se popře smysl prioritního plánování. Řeší se například dědičností priority (priority inheritance), kdy vlákno držící zámek dočasně zdědí prioritu vlákna, které na zámek čeká.","kod":"7ZNAS/09","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Jak funguje race detektor typu ThreadSanitizer nebo Helgrind?","a":"Za běhu programu sleduje všechny přístupy do paměti a synchronizační operace a buduje si happens-before relaci mezi událostmi v různých vláknech. Pokud najde dva přístupy ke stejné adrese, z nichž aspoň jeden je zápis, a mezi kterými neexistuje synchronizační vztah (nejsou v happens-before relaci), nahlásí to jako race condition - i když se v konkrétním běhu časově nesrazily.","kod":"7ZNAS/09","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Jaký je rozdíl mezi cyklickou bariérou a CountDownLatch?","a":"Bariéra se po uvolnění všech vláken automaticky resetuje a lze ji použít znovu pro další fázi/kolo výpočtu. CountDownLatch je jednorázová - jakmile čítač dojde na nulu a vlákna projdou, latch se znovu použít nedá.","kod":"7ZNAS/09","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Jaký je rozdíl mezi lock-free a wait-free algoritmem?","a":"Lock-free garantuje jen to, že systém jako celek vždy postoupí dál (aspoň jedno vlákno se dostane k výsledku), jednotlivé vlákno ale teoreticky může hladovět. Wait-free je silnější záruka - každé jednotlivé vlákno dokončí svou operaci v konečném počtu kroků bez ohledu na ostatní vlákna; každý wait-free algoritmus je automaticky i lock-free, opačně to ale neplatí.","kod":"7ZNAS/09","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Jaký je rozdíl mezi mutexem a spinlockem?","a":"Mutex uspí čekající vlákno a probudí ho, až je zámek volný, zatímco spinlock vlákno nechá aktivně čekat ve smyčce. Spinlock se vyplatí jen u velmi krátkých kritických sekcí, protože ušetří režii za uspání/probuzení, ale zbytečně spotřebovává CPU, pokud se čeká déle.","kod":"7ZNAS/09","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"Proč je čtení pomocí RCU rychlejší než pomocí zámku pro čtení a zápis (R/W lock)?","a":"U R/W zámku si čtenáři i přes vzájemnou kompatibilitu musí sáhnout na sdílený čítač/stav zámku, což stojí atomické operace a cache koherenci. U RCU je rcu_read_lock/unlock téměř no-op (jen vypnutí preempce nebo memory barrier), čtenáři na sebe navzájem nečekají a writer veškerou režii kopírování a čekání nese sám.","kod":"7ZNAS/09","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-29"},{"q":"🗣️ 7ZNAS/09 — Řekni osnovu odpovědi","a":"Nejdřív probereme, jak se vícevláknové programy testují a ladí - detekce race conditions a deadlocků, zátěžové testy, logování, debuggery a analyzátory. Pak si projdeme klasické synchronizační mechanismy - zámek, semafor a cyklickou bariéru - a na závěr ukážu i modernější neblokující alternativy, lock-free přístupy a RCU.","kod":"7ZNAS/09","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-29"},{"q":"Co je hypervizor a jaký je rozdíl mezi typem 1 a typem 2?","a":"Hypervizor je software nebo firmware, které vytváří a řídí virtuální stroje nad fyzickým hardwarem. Typ 1 běží přímo na holém hardwaru (bare-metal) bez hostitelského OS a používá se v datacentrech pro vyšší výkon. Typ 2 běží jako aplikace nad běžným hostitelským operačním systémem, což je jednodušší na instalaci a typické pro desktopové použití.","kod":"7ZNAS/10","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Co je virtualizace na úrovni OS a čím se liší od plné virtualizace?","a":"Virtualizace na úrovni OS virtualizuje fyzický server přímo na úrovni operačního systému - všechny instance sdílí jedno jádro, jen jsou od sebe izolované (princip kontejnerů). Plná virtualizace naproti tomu simuluje kompletní hardware, takže každý guest má vlastní nezávislé jádro OS, což je bezpečnější, ale výrazně náročnější na zdroje.","kod":"7ZNAS/10","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Co jsou Intel VT-x a AMD-V a k čemu slouží?","a":"Jsou to hardwarová rozšíření instrukční sady x86 procesorů, která zavádí nový privilegovaný režim pro hypervizor. Díky nim procesor sám zachytává a řeší citlivé instrukce guest OS, takže guest může běžet neupravený a bez nutnosti softwarového binárního překladu, což zvyšuje výkon virtualizace.","kod":"7ZNAS/10","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Jaké jsou hlavní nevýhody virtualizace?","a":"Výkonová režie (zejména u plné virtualizace bez hardwarové podpory), vyšší spotřeba zdrojů oproti kontejnerům, a riziko jednoho bodu selhání - pokud selže fyzický hostitel, ovlivní to všechny virtuální stroje na něm běžící, pokud není zajištěna replikace nebo migrace na jiný hostitel.","kod":"7ZNAS/10","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Jaký je rozdíl mezi emulací a simulací?","a":"Emulace řeší jen část problému a bývá implementována pomocí stavových automatů (např. emulace konkrétní instrukce nebo periferie). Simulace naproti tomu modeluje celý hardware do detailu, typicky se používá při návrhu a testování procesorů ještě před jejich fyzickou výrobou.","kod":"7ZNAS/10","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Jaký je rozdíl mezi virtuálním strojem a kontejnerem?","a":"Virtuální stroj obsahuje kompletní vlastní OS jádro a je izolován na úrovni hypervizoru/hardwaru, což je bezpečnější, ale pomalejší na start a náročnější na zdroje (desítky GB u Windows). Kontejner sdílí jádro hostitelského OS a izoluje procesy pomocí control groups a jmenných prostorů, takže startuje rychle a spotřebuje méně zdrojů, ale nabízí slabší izolaci než VM.","kod":"7ZNAS/10","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Proč paravirtualizace vyžaduje upravený guest OS?","a":"Protože se nespoléhá na to, že hypervizor uhodne a emuluje každou citlivou instrukci - místo toho guest OS aktivně volá konkrétní API hypervizoru pomocí speciální instrukce (hypercall). To vyžaduje zásah do zdrojového kódu jádra guest OS, ale zároveň to snižuje režii oproti plné emulaci.","kod":"7ZNAS/10","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Proč samotná konsolidace pomocí virtualizace nestačí tam, kde chci horizontální škálovatelnost?","a":"Protože virtualizace zdroje sdílí uvnitř jednoho fyzického stroje a nijak neřeší problémy typické pro více uzlů - výpadky sítě, replikaci dat, konsenzus mezi uzly nebo směrování požadavků. Pro horizontální škálování a odolnost proti výpadku uzlu je potřeba nad virtualizací (nebo místo ní) postavit distribuovanou/cloudovou architekturu s vlastní orchestrací.","kod":"7ZNAS/10","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"🗣️ 7ZNAS/10 — Řekni osnovu odpovědi","a":"Nejdřív vysvětlím, proč se vůbec virtualizace používá - jaké čtyři hlavní motivace za ní stojí (konsolidace, izolace, správa, obnova). Pak ukážu, v čem se tento přístup principiálně liší od standardní distribuované architektury. Následně projdu jednotlivé typy virtualizace - plnou, částečnou, paravirtualizaci a hardwarově asistovanou, včetně typů hypervizoru. Nakonec ke každému typu přiřadím, jaké má nároky na hardware.","kod":"7ZNAS/10","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-30"},{"q":"Co je to multitenance a proč je bezpečnostně riziková?","a":"Multitenance znamená, že na stejném fyzickém hardwaru běží současně workloady více různých, vzájemně si neznámých zákazníků, oddělené jen virtualizací. Riziko spočívá v tom, že selhání izolace (chyba v hypervizoru, sdílené jádro u kontejnerů) může vést k úniku dat nebo ovlivnění výkonu mezi zcela nesouvisejícími nájemci.","kod":"7ZNAS/11","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Co je to shared responsibility model?","a":"Je to princip, kdy si poskytovatel cloudu a zákazník dělí odpovědnost za bezpečnost podle úrovně služby – čím výš (IaaS → PaaS → SaaS), tím víc vrstev (hardware, OS, runtime, případně i aplikace) spravuje poskytovatel a tím méně toho musí hlídat zákazník, kterému naopak vždy zůstává odpovědnost za vlastní data a přístupová oprávnění.","kod":"7ZNAS/11","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Co je to VM escape a jak se mu brání?","a":"VM escape je útok, při kterém se škodlivý kód z izolovaného virtuálního stroje dostane ven a získá přístup k hypervizoru nebo hostitelskému systému. Brání se tomu především kvalitním a pravidelně patchovaným hypervizorem, hardwarově asistovanou virtualizací a volbou silnější izolace (VM místo kontejneru) pro citlivé workloady.","kod":"7ZNAS/11","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Co je vendor lock-in a jak se mu dá předejít?","a":"Je to závislost na konkrétním cloudovém poskytovateli způsobená používáním jeho proprietárních služeb, formátů nebo API, která ztěžuje a prodražuje přechod k jinému poskytovateli. Předchází se tomu použitím otevřených standardů, kontejnerizací (přenositelnost přes Docker/Kubernetes) a vědomým zvážením, které služby jsou opravdu specifické pro danou platformu.","kod":"7ZNAS/11","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Jaký je rozdíl mezi kontejnerem a virtuálním strojem z hlediska izolace?","a":"Virtuální stroj má vlastní jádro OS a nesdílí systémové zdroje s hostitelem ani jinými VM, zatímco kontejnery sdílí jádro hostitelského OS i systémové zdroje se všemi ostatními kontejnery na stejném stroji. VM je proto bezpečnostně izolovanější, ale těžší a pomaleji startuje, kontejner je lehčí a rychlejší, ale zranitelnější vůči úniku mezi kontejnery.","kod":"7ZNAS/11","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Jaký je rozdíl mezi public, private a hybrid cloudem?","a":"Public cloud běží na sdílené infrastruktuře externího poskytovatele a je nejlevnější, ale s nejmenší kontrolou; private cloud je dedikovaná infrastruktura pro jednu organizaci s vyšší kontrolou i náklady; hybrid cloud kombinuje obojí, typicky tak, že citlivější data a systémy zůstávají v private části a zbytek běží ve veřejném cloudu.","kod":"7ZNAS/11","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"K čemu slouží Gatekeeper a Valet Key pattern?","a":"Gatekeeper je vyhrazená instance stojící mezi klientem a chráněnou službou, která validuje a čistí požadavky, čímž snižuje útočnou plochu systému. Valet Key je dočasný token, který klientovi umožní přímý, ale časově i rozsahem omezený přístup ke konkrétnímu zdroji (např. úložišti), aniž by aplikace musela zprostředkovávat každý přenos dat sama.","kod":"7ZNAS/11","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"Proč nejsou virtuální stroje automaticky bezpečnější než fyzický hardware?","a":"Protože bezpečnost virtuálního stroje závisí na kvalitě hypervizoru, jeho konfiguraci a patchování, ne na samotném principu virtualizace. Pokud je hypervizor zranitelný nebo špatně nastavený, virtualizace může naopak přidat novou útočnou plochu (útok na hypervizor, únik mezi nájemci), kterou fyzický samostatný server nemá.","kod":"7ZNAS/11","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-30"},{"q":"🗣️ 7ZNAS/11 — Řekni osnovu odpovědi","a":"Nejdřív probereme, proč firmy nasazují cloud a s jakými riziky se přitom potýkají. Pak si ukážeme, na jaké úrovni se dá cloud \"pronajmout\" – IaaS, PaaS, SaaS – a kdo v každém modelu za co odpovídá. Poté se zaměřím na bezpečnost samotné virtualizace – izolaci strojů, útoky na hypervizor a sdílení zdrojů mezi zákazníky. Nakonec shrnu, jak se v takovém prostředí chrání data na úrovni služby, softwaru a hardwaru.","kod":"7ZNAS/11","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-30"},{"q":"Co se stane, když exekutor nechce požadavek splnit nebo iniciátor nesouhlasí s výsledkem?","a":"To řeší kompletní vzor transakce. Exekutor může místo příslibu požadavek odmítnout (decline) — následuje vyjednávání, nebo iniciátor transakci ukončí (quit). Iniciátor může místo akceptace výsledek odmítnout (reject). Navíc existují čtyři vzory rušení (cancellation) podle fáze, ve které se ruší: druhá strana rušení buď dovolí (allow), nebo odmítne (refuse) — pak původní koordinační fakt zůstává v platnosti.","kod":"7ZNAS/14","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Jak byste transakčním vzorem popsali rezervaci hotelového pokoje?","a":"Iniciátor host, exekutor hotel (recepce). Request: host žádá o pokoj na termín. Promise: hotel rezervaci potvrdí (nebo decline, je-li obsazeno). Execute: hotel rezervaci vytvoří a blokuje pokoj — vzniká produkční fakt „rezervace vznikla\". State: hotel zašle potvrzení rezervace. Accept: host potvrzení akceptuje. Platba by byla samostatnou transakcí, stejně jako u kytice ve skriptech.","kod":"7ZNAS/14","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Jak spolu tři úrovně abstrakce souvisejí — proč tvoří hierarchii?","a":"Infologické transakce jsou podstatou realizace ontologických transakcí: reprodukují a odvozují znalosti, které ontologičtí aktoři potřebují k rozhodování. Datalogické transakce jsou podstatou realizace infologických transakcí: ukládají, načítají a přenášejí dokumenty s informacemi pro infologické aktory. Ontologii podniku tvoří pouze ontologické transakce s rolemi aktorů — nižší úrovně lze měnit a automatizovat, aniž se změní podstata podniku.","kod":"7ZNAS/14","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Jaké jsou tři fáze transakce a co se v nich děje?","a":"Objednací fáze (O-phase): iniciátor a exekutor pracují na dohodě o plánovaném výsledku — obsahuje request a promise. Prováděcí fáze (E-phase): exekutor skutečně vytvoří produkční fakt. Výsledková fáze (R-phase): obě role pracují na dohodě o skutečně vytvořeném výsledku — obsahuje state a accept; skutečný výsledek i čas se mohou od původně požadovaných lišit a fakt vstupuje v platnost až dosažením dohody.","kod":"7ZNAS/14","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Jaký je rozdíl mezi koordinačním a produkčním činem?","a":"Produkčním činem (P-čin) aktor přispívá k cílům podniku — vytváří materiální výsledek (kytice, chléb) nebo nemateriální výsledek (rozsudek, rozhodnutí komise); výsledkem je produkční fakt. Koordinačním činem (C-čin) aktor vstupuje do závazků vůči jinému aktorovi ohledně produkčních činů — požadavek, příslib, předvedení, přijetí; výsledkem je koordinační fakt. Podle toho rozlišujeme svět produkce (P-svět) a svět koordinace (C-svět), jejichž stav je dán množinou dosud vytvořených faktů.","kod":"7ZNAS/14","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Kdo je iniciátor a exekutor u státní zkoušky a co je produkčním faktem?","a":"Iniciátorem je student — transakci zahajuje přihláškou a akceptuje výsledek. Exekutorem je zkušební komise — přislíbí termín, vykoná zkoušení a vyhlásí výsledek. Produkčním faktem je nemateriální fakt „student vykonal státní zkoušku s výsledkem Y\", vzniklý rozhodnutím komise; v platnost vstupuje akceptací ve výsledkové fázi.","kod":"7ZNAS/14","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Proč se ontologická úroveň nazývá podle schopnosti performa a co znamenají latinské kořeny názvů?","a":"Performa („per-forma\" — skrz formu) je schopnost ustanovit nové originální věci: závazky, rozhodnutí, posouzení — a to je jádro podnikání, proto se tyto činy nazývají esenciální či ontologické. Informa („in-forma\" — to, co je ve formě) je schopnost pracovat s obsahem: myšlenky, odvozování, výpočty. Forma je schopnost pracovat s formou: mluvení, psaní, ukládání a přenos dat.","kod":"7ZNAS/14","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Ze kterých aspektových modelů se skládá kompletní ontologický model podniku?","a":"Ze čtyř: konstrukční model (transakční typy a role aktorů; skládá se z interakčního a interstrikčního modelu), procesní model (jak jsou transakce propojeny — kauzální a podmíněná spojení), model akcí (pravidla činností, kterými se aktoři řídí při zpracování agendy) a stavový model (stavový prostor produkčního a koordinačního světa, vyjádřený modelováním rolí objektů).","kod":"7ZNAS/14","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"🗣️ 7ZNAS/14 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím, jak podniková ontologie chápe podnikový proces — jako transakci mezi dvěma rolemi aktorů. Popíšu transakční vzor s pěti kroky a třemi fázemi a předvedu ho na příkladu státní zkoušky. Pak ukážu, v čem se tento komunikačně-závazkový pohled zásadně liší od tradičních přístupů typu diagramů toků či BPMN. Nakonec charakterizuji tři úrovně abstrakce — datalogickou, infologickou a ontologickou (forma, obsah, záměr) — a ukážu je na příkladu rezervace hotelového pokoje.","kod":"7ZNAS/14","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-31"},{"q":"Co je edge AI a proč se používá?","a":"Edge AI znamená provoz (inferenci) natrénovaného modelu přímo v koncovém zařízení, místo posílání dat do cloudu k vyhodnocení. Snižuje se tím latence, spotřeba dat a energie a zlepšuje se soukromí, protože citlivá data (např. obraz z kamery) nemusí opustit zařízení.","kod":"7ZNAS/15","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Jak souvisí IoT a Průmysl 4.0 s hardwarem pro AI?","a":"IoT zařízení a brány sbírají velké množství dat ze senzorů, která se stále častěji vyhodnocují pomocí AI/strojového učení přímo na okraji sítě nebo v bránách, aby se snížilo zatížení sítě a zrychlila reakce. Průmysl 4.0 na to staví kyberfyzikálními systémy, kde autonomní jednotky (agenty) rozhodují a řídí výrobu na základě těchto dat v reálném čase.","kod":"7ZNAS/15","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Jaký je rozdíl mezi TPU a NPU?","a":"Oba jsou specializované jednotky pro neuronové sítě, TPU je konkrétní návrh firmy Google (používaný např. v Coral Edge TPU), NPU je obecnější označení pro podobné akcelerátory integrované v mobilních SoC (např. Huawei Da Vinci architektura). Principiálně dělají totéž – zrychlují operace typické pro AI.","kod":"7ZNAS/15","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Proč je ASIC rychlejší než FPGA, když je FPGA programovatelné?","a":"FPGA má navíc obvody pro rekonfigurovatelnost (programovatelné propojení, spínací matice), které zabírají místo na čipu a zpomalují signál. ASIC je navržen a odlit přesně pro danou funkci bez tohoto přebytku, takže je při stejné technologii rychlejší a úspornější, ale nelze ho po výrobě změnit.","kod":"7ZNAS/15","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Proč se pro AI nepoužívá jen klasické CPU?","a":"CPU je optimalizované na rychlé sekvenční zpracování obecných úloh s malým počtem výkonných jader, zatímco výpočty neuronových sítí jsou masivně paralelní (mnoho jednoduchých operací najednou). GPU, TPU a NPU mají desítky až tisíce jednodušších jader, což je pro tento typ výpočtu mnohem efektivnější.","kod":"7ZNAS/15","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Proč se u velkosériové výroby vyplatí přejít z FPGA na ASIC?","a":"FPGA je dražší na kus (kvůli programovatelným prvkům) a méně energeticky efektivní, ale levné na vývoj a změny. U velkých sérií se jednorázová vysoká cena návrhu ASIC rozpočítá do mnoha kusů a výsledná cena i spotřeba na kus jsou nižší, proto se produkty po odladění na FPGA typicky převádí do ASIC.","kod":"7ZNAS/15","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"Uveďte konkrétní příklad SoM a vysvětlete, proč nejde o SoC.","a":"Modul Coral (Coral SoM) obsahuje SoC s Edge TPU, pamětí a flash úložištěm na malé destičce, kterou je nutné osadit na nosnou desku s konektory a napájením. Nejde o jeden čip, ale o celý modul – SoC je uvnitř SoM jako jedna z jeho součástí.","kod":"7ZNAS/15","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-07-31"},{"q":"🗣️ 7ZNAS/15 — Řekni osnovu odpovědi","a":"Nejprve popíšu, čím se hardware pro AI liší od klasického CPU – proč se používá masivní paralelismus a specializované čipy (GPU, TPU/NPU, FPGA, ASIC) a jak se to promítá do akcelerace inference na okraji sítě (edge AI, Coral). Poté vysvětlím rozdíl mezi SoC a SoM. Nakonec to spojím s praktickým uplatněním – embedded zařízení, IoT, mobilní telefony a rozdíl mezi prototypováním a sériovou výrobou.","kod":"7ZNAS/15","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-07-31"},{"q":"Co je CRISP-DM a proč se považuje za standard?","a":"CRISP-DM je metodika popisující proces dobývání znalostí v šesti fázích (porozumění problematice, porozumění datům, příprava dat, modelování, vyhodnocení, nasazení), vzniklá jako univerzální, na odvětví nezávislý postup. V praxi je dnes de facto standard, protože jej podporuje většina systémů pro dobývání znalostí a poskytuje i návod na řešení typických problémů.","kod":"7ZNAS/16","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-08-01"},{"q":"Co je to 4ft tabulka a k čemu slouží kvantifikátor?","a":"4ft tabulka je čtyřpolní tabulka četností (a, b, c, d) popisující, kolik objektů splňuje antecedent a sukcedent v kombinaci pravda/nepravda. Kvantifikátor je podmínka nad těmito čtyřmi čísly, která rozhoduje, zda je daný vztah mezi antecedentem a sukcedentem považován za zajímavý (platný) — zobecňuje tak pojmy podpora a spolehlivost do širší rodiny testů.","kod":"7ZNAS/16","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-08-01"},{"q":"Co je to podpora, spolehlivost a zlepšení asociačního pravidla?","a":"Podpora udává, jak často se pravidlo (předpoklad i závěr) v datech vyskytuje. Spolehlivost udává, jak často platí závěr, když platí předpoklad. Zlepšení (lift) porovnává spolehlivost s tím, jak často by se závěr vyskytoval čistě náhodou — hodnota pod 1 znamená, že pravidlo je horší než náhodný odhad.","kod":"7ZNAS/16","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-08-01"},{"q":"Čím se metoda GUHA principiálně liší od klasického testování hypotéz?","a":"Klasická statistika ověřuje jednu předem danou hypotézu na datech. GUHA naopak systematicky generuje celý prostor možných hypotéz (observačních tvrzení) definovaný vstupními parametry a všechny je na datech testuje, takže uživateli automaticky nabídne všechny zajímavé a pravdivé souvislosti, ne jen tu, kterou si sám vymyslel.","kod":"7ZNAS/16","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-08-01"},{"q":"Jak funguje algoritmus Apriori?","a":"Apriori nejprve najde všechny jednotlivé položky s dostatečnou četností (frequent 1-itemsets), a pak iterativně generuje kandidáty na delší kombinace pouze z těch kratších kombinací, které už četnost splnily (protože každá podmnožina frekventované kombinace musí být také frekventovaná). Z výsledných frekventovaných kombinací se pak odvodí asociační pravidla splňující práh spolehlivosti.","kod":"7ZNAS/16","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-08-01"},{"q":"Jak se model naučený data miningem promítne do báze znalostí?","a":"Rozhodovací strom se převede na množinu pravidel tak, že každá cesta od kořene k listu dá jedno IF–THEN pravidlo. Asociační pravidla a GUHA hypotézy jsou v této podobě prakticky přímo, stačí je filtrovat podle prahů. Výsledná pravidla se uloží ve strukturované, přenositelné podobě (např. standard PMML), aby je šlo použít v systému pro podporu rozhodování.","kod":"7ZNAS/16","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-08-01"},{"q":"Jaký je rozdíl mezi KDD a data miningem?","a":"KDD je celý proces od surových dat po srozumitelné znalosti (výběr dat, předzpracování, modelování, interpretace, nasazení). Data mining je jen ta fáze KDD, ve které se na připravená data aplikují analytické metody (stromy, asociační pravidla, GUHA) a vzniká model.","kod":"7ZNAS/16","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-08-01"},{"q":"Proč se u rozhodovacích stromů používá entropie a jak se počítá?","a":"Entropie měří neuspořádanost (nečistotu) množiny příkladů vzhledem k třídám, do kterých patří — čím čistší množina, tím nižší entropie. Pro každý kandidátní atribut se spočítá vážená střední entropie podmnožin po rozdělení podle jeho hodnot a vybere se atribut, který entropii sníží nejvíce, tedy nejlépe oddělí třídy.","kod":"7ZNAS/16","okruh":"7ZNAS","typ":"🔍 Detail","datum":"2026-08-01"},{"q":"🗣️ 7ZNAS/16 — Řekni osnovu odpovědi","a":"Nejprve vysvětlím, co je dobývání znalostí z databází a jak vypadá celý proces od surových dat po znalosti — projdu kroky a zmíním standardní metodiky. Pak popíšu dvě základní metody, se kterými se v tomto procesu pracuje — rozhodovací stromy a asociační pravidla. Dále ukážu, jak se z natrénovaných modelů konstruuje báze znalostí. Nakonec podrobně představím metodu GUHA jako český příspěvek k automatickému generování hypotéz z dat.","kod":"7ZNAS/16","okruh":"7ZNAS","typ":"🗣️ Osnova","datum":"2026-08-01"}];
const EXAM = new Date(2026, 7, 19); // 19. 8. 2026
const LS_KEY = 'statnice-flash-v1';

// ---------- data ----------
function hash(s){let h=5381;for(let i=0;i<s.length;i++){h=((h<<5)+h+s.charCodeAt(i))|0}return (h>>>0).toString(36)}
const strip = s => (s||'').replace(/\*\*/g,'').trim();
const CARDS = CARDS_RAW.map(c => ({
  id: hash(c.kod + '|' + c.q),
  q: strip(c.q), a: strip(c.a),
  kod: c.kod, okruh: c.okruh,
  osnova: (c.typ||'').includes('Osnova'),
  datum: c.datum || ''
}));
const KODY = [...new Set(CARDS.map(c=>c.kod))].sort();

// plán 2. průchodu a opakování (1. průchod čte přímo z datum na kartách)
const PLAN2 = {
  '2026-08-02':{k:['7ZNA1/01','7ZNA1/02','7ZNA1/03'],l:'🔁 2. průchod'},
  '2026-08-03':{k:['7ZNA1/04','7ZNA1/05','7ZNA1/06'],l:'🔁 2. průchod'},
  '2026-08-04':{k:['7ZNA1/07','7ZNA1/08','7ZNA2/01'],l:'🔁 2. průchod'},
  '2026-08-05':{k:['7ZNA2/02','7ZNA2/03','7ZNA2/09'],l:'🔁 2. průchod'},
  '2026-08-06':{k:['7ZNA2/10','7ZNAS/01','7ZNAS/02'],l:'🔁 2. průchod'},
  '2026-08-07':{k:['7ZNAS/03','7ZNAS/04','7ZNAS/05'],l:'🔁 2. průchod'},
  '2026-08-08':{k:['7ZNAS/06','7ZNAS/07','7ZNAS/08'],l:'🔁 2. průchod'},
  '2026-08-09':{k:['7ZNAS/09','7ZNAS/10','7ZNAS/11'],l:'🔁 2. průchod'},
  '2026-08-10':{k:['7ZNAS/14','7ZNAS/15','7ZNAS/16'],l:'🔁 2. průchod'},
  '2026-08-11':{mode:'chyby',l:'🧯 Rezerva — chybné karty'},
  '2026-08-12':{mode:'chyby',l:'🧯 Rezerva — chybné karty'},
  '2026-08-13':{okruh:'7ZNA1',l:'🧩 Opakování okruhu'},
  '2026-08-14':{okruh:'7ZNA2',l:'🧩 Opakování okruhu'},
  '2026-08-15':{k:['7ZNAS/01','7ZNAS/02','7ZNAS/03','7ZNAS/04','7ZNAS/05','7ZNAS/06','7ZNAS/07','7ZNAS/08'],l:'🧩 Opakování okruhu'},
  '2026-08-16':{k:['7ZNAS/09','7ZNAS/10','7ZNAS/11','7ZNAS/14','7ZNAS/15','7ZNAS/16'],l:'🧩 Opakování okruhu'},
  '2026-08-17':{mode:'osnovy',l:'🎯 Generálka — všechny osnovy'},
  '2026-08-18':{mode:'chyby',l:'🎯 Lehký den — chybné karty'},
  '2026-08-19':{mode:'osnovy',l:'🎓 Ráno jen osnovy. Hodně štěstí!'},
};

// ---------- stats (localStorage) ----------
let stats = {};
try { stats = JSON.parse(localStorage.getItem(LS_KEY) || '{}') } catch(e) { stats = {} }
function saveStats(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(stats)) }catch(e){} }
function mark(id, ok){
  const s = stats[id] || {r:0,w:0};
  ok ? s.r++ : s.w++;
  s.last = ok ? 'r' : 'w';
  stats[id] = s; saveStats();
}
const wrongCards = () => CARDS.filter(c => (stats[c.id]||{}).last === 'w');
const masteredCount = () => CARDS.filter(c => (stats[c.id]||{}).last === 'r').length;

// ---------- decks ----------
function todayISO(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayDeck(){
  const t = todayISO();
  const p = PLAN2[t];
  if (p){
    let cards;
    if (p.k) cards = CARDS.filter(c => p.k.includes(c.kod));
    else if (p.okruh) cards = CARDS.filter(c => c.okruh === p.okruh);
    else if (p.mode === 'chyby') cards = wrongCards();
    else if (p.mode === 'osnovy') cards = CARDS.filter(c => c.osnova);
    return { label: p.l, cards };
  }
  const byDate = CARDS.filter(c => c.datum === t);
  if (byDate.length) return { label: '🚀 1. průchod — dnešní nové otázky', cards: byDate };
  return { label: '📅 Na dnešek není nic v plánu — dej si osnovy', cards: CARDS.filter(c => c.osnova) };
}
const DECKS = [
  { id:'dnes',   name:'📅 Dnes' },
  { id:'chyby',  name:'❗ Moje chyby' },
  { id:'osnovy', name:'🗣️ Osnovy' },
  { id:'7ZNA1',  name:'🧮 7ZNA1' },
  { id:'7ZNA2',  name:'🛠️ 7ZNA2' },
  { id:'7ZNAS',  name:'🏢 7ZNAS' },
  { id:'vse',    name:'🎲 Vše' },
];
function buildDeck(id){
  switch(id){
    case 'dnes':   return todayDeck();
    case 'chyby':  return { label:'❗ Karty, které ti naposledy nesedly', cards: wrongCards() };
    case 'osnovy': return { label:'🗣️ Osnovy všech 27 otázek', cards: CARDS.filter(c=>c.osnova) };
    case '7ZNA1': case '7ZNA2': case '7ZNAS':
      return { label:'🧩 Celý okruh ' + id, cards: CARDS.filter(c=>c.okruh===id) };
    case 'vse':    return { label:'🎲 Všech 250 karet, zamíchané', cards: CARDS.slice() };
    default:
      return { label:'🎯 Otázka ' + id, cards: CARDS.filter(c=>c.kod===id) };
  }
}

// ---------- session ----------
let queue = [], pos = 0, firstTotal = 0, correct = 0, missed = [], requeued = {};
let flipped = false, currentDeckId = 'dnes';

function shuffle(a){
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function startDeck(id){
  currentDeckId = id;
  const deck = buildDeck(id);
  document.querySelectorAll('.decks button').forEach(b => b.classList.toggle('active', b.dataset.id === id));
  document.getElementById('kodSelect').value = KODY.includes(id) ? id : '';
  const info = document.getElementById('deckInfo');
  if (!deck.cards.length){
    info.textContent = deck.label;
    showEmpty(id === 'chyby' ? 'Žádné chybné karty. 🎉 Zatím ti sedlo všechno, na co jsi sáhl.' : 'V tomhle balíčku nejsou žádné karty.');
    return;
  }
  queue = shuffle(deck.cards.slice());
  // osnova karty dopředu, ať se začíná velkým obrazem
  queue.sort((a,b) => (b.osnova?1:0) - (a.osnova?1:0));
  pos = 0; firstTotal = queue.length; correct = 0; missed = []; requeued = {};
  info.textContent = deck.label + ' · ' + firstTotal + ' karet';
  renderCard();
}
function showEmpty(msg){
  const stage = document.getElementById('stage');
  stage.innerHTML = '<div class="empty"><p style="font-size:2rem;margin:0 0 10px">🌤️</p><p>' + msg + '</p></div>';
  document.getElementById('btnGood').disabled = true;
  document.getElementById('btnBad').disabled = true;
  document.getElementById('bar').style.width = '0%';
  updateStatsLine();
}
function renderCard(){
  const stage = document.getElementById('stage');
  if (!document.getElementById('card')) {
    stage.innerHTML = CARD_HTML;
    bindCard();
  }
  const c = queue[pos];
  flipped = false;
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  const cls = c.okruh === '7ZNA1' ? 'o1' : c.okruh === '7ZNA2' ? 'o2' : 'o3';
  const fB = document.getElementById('fBadge'), bB = document.getElementById('bBadge');
  fB.textContent = c.kod; bB.textContent = c.kod;
  fB.className = 'badge ' + cls; bB.className = 'badge ' + cls;
  document.getElementById('fTag').hidden = !c.osnova;
  document.getElementById('qText').textContent = c.q;
  document.getElementById('aText').textContent = c.a;
  document.getElementById('btnGood').disabled = true;
  document.getElementById('btnBad').disabled = true;
  const done = Math.min(pos, firstTotal);
  document.getElementById('bar').style.width = (100 * done / Math.max(queue.length,1)) + '%';
  updateStatsLine();
}
function flip(){
  const card = document.getElementById('card');
  if (!card || !queue.length) return;
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
  document.getElementById('btnGood').disabled = !flipped;
  document.getElementById('btnBad').disabled = !flipped;
}
function answer(ok){
  if (!flipped || !queue.length) return;
  const c = queue[pos];
  const firstTry = !requeued[c.id + ':seen'];
  requeued[c.id + ':seen'] = true;
  if (firstTry){ if (ok) correct++; else missed.push(c); }
  mark(c.id, ok);
  if (!ok && !requeued[c.id]){
    requeued[c.id] = true;
    queue.push(c); // chybnou kartu zopakujeme na konci
  }
  pos++;
  if (pos >= queue.length) showSummary();
  else renderCard();
}
function showSummary(){
  const stage = document.getElementById('stage');
  const pct = firstTotal ? Math.round(100 * correct / firstTotal) : 0;
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '💪' : pct >= 50 ? '📚' : '🧗';
  let missHtml = '';
  if (missed.length){
    missHtml = '<ul class="misses">' + missed.slice(0, 8).map(m =>
      '<li><b>' + m.kod + '</b> — ' + m.q.slice(0, 90) + (m.q.length > 90 ? '…' : '') + '</li>').join('') + '</ul>';
    if (missed.length > 8) missHtml += '<p>…a dalších ' + (missed.length - 8) + '.</p>';
  }
  stage.innerHTML =
    '<div class="summary"><h2>' + emoji + ' Balíček hotový</h2>' +
    '<div class="big">' + correct + ' / ' + firstTotal + '</div>' +
    '<p>úspěšnost na první pokus ' + pct + ' %' + (missed.length ? ' · chybných karet: ' + missed.length : ' · bez chyby!') + '</p>' +
    missHtml +
    '<div class="sumbtns">' +
    (missed.length ? '<button class="primary" id="againWrong">🔁 Zopakovat chybné</button>' : '') +
    '<button id="againDeck">🎲 Znovu celý balíček</button>' +
    '</div></div>';
  document.getElementById('btnGood').disabled = true;
  document.getElementById('btnBad').disabled = true;
  document.getElementById('bar').style.width = '100%';
  updateStatsLine();
  const aw = document.getElementById('againWrong');
  if (aw) aw.onclick = () => {
    queue = shuffle(missed.slice()); missed = []; requeued = {};
    pos = 0; firstTotal = queue.length; correct = 0;
    renderCard();
  };
  document.getElementById('againDeck').onclick = () => startDeck(currentDeckId);
}
function updateStatsLine(){
  document.getElementById('statsLine').textContent =
    '✅ zvládnuto celkem: ' + masteredCount() + ' / ' + CARDS.length + ' karet';
}

// ---------- UI init ----------
const CARD_HTML = document.getElementById('stage').innerHTML;
function bindCard(){
  const card = document.getElementById('card');
  card.addEventListener('click', flip);
  card.addEventListener('keydown', e => { if (e.key === 'Enter') flip(); });
}
bindCard();

const deckBar = document.getElementById('deckBar');
DECKS.forEach(d => {
  const b = document.createElement('button');
  b.textContent = d.name; b.dataset.id = d.id;
  b.onclick = () => startDeck(d.id);
  deckBar.appendChild(b);
});
const sel = document.getElementById('kodSelect');
KODY.forEach(k => {
  const o = document.createElement('option');
  o.value = k; o.textContent = k;
  sel.appendChild(o);
});
sel.onchange = () => { if (sel.value) startDeck(sel.value); };

document.getElementById('btnGood').onclick = () => answer(true);
document.getElementById('btnBad').onclick = () => answer(false);

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'SELECT') return;
  if (e.code === 'Space'){ e.preventDefault(); flip(); }
  else if (e.key === '1' || e.key === 'ArrowRight') answer(true);
  else if (e.key === '2' || e.key === 'ArrowLeft') answer(false);
});

// countdown
(function(){
  const now = new Date(); now.setHours(0,0,0,0);
  const days = Math.round((EXAM - now) / 86400000);
  document.getElementById('countdown').textContent =
    days > 0 ? '🎓 státnice za ' + days + ' dní · st 19. 8.' : days === 0 ? '🎓 DNES — hodně štěstí!' : '🎓 zvládnuto 🎉';
})();

// theme toggle (funguje lokálně i v artifact vieweru)
document.getElementById('themeBtn').onclick = () => {
  const r = document.documentElement;
  const cur = r.getAttribute('data-theme');
  const preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const next = cur ? (cur === 'dark' ? 'light' : 'dark') : (preferDark ? 'light' : 'dark');
  r.setAttribute('data-theme', next);
};

startDeck('dnes');
</script>
